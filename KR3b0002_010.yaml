body:
  text: 六韜逸文人父孤人忠諫者死臾誢者賞以君子為下以小人為馬出入不以時風甚雨寒暑喜治宮室台池日日夜久七十三所大宮王般庚之正武王曰于呼般曰禮賢敬士聽獨斷而言凡不凡治國主務舉賢故昔者湯之治曰奈何大公曰法令通而未足以大利其民者也是以法令利民之問太公曰為國而能更法令者曰章矣塞姦不得上下惑不法草木不羊日月傳蝕列星數之乎對曰未有日月斷蝕有始以歡為喜不豫而喜奪此妾為正臣虜明貴胥餘大宮室舊以復多熊狼月食曰吾聞有苗雨沾血朝衣是非有苗有苗月蝕日斷三日不解是非有苗三日不見日是非有苗之耶對曰然則有苗何以亡對曰有之右蠡之水建土險也有苗是謂所之也一曰君而害其國二曰臣移者害其君三大者害其本四曰枝盛者五者害其八曰曰王問太公治亂奈何太公曰其本武王曰為吏治也安在太吏者重能者之也者吏之也乃失其國曰吏之觀民之奈何乎太公吏任吏與民通吏與民謂合吏吏可以吏毋姦段段而衆人於土者臣吏也快志當曰吏公上好淫鬼不鄉天必降央風雨不時不之治國敢問所泥不用所愛不用武王問太公曰王君之治國何如乎太公重賦斂奪萬民而腐之於府庫所康不得聲嚴而行賢者反佻伏其君不更不誨使下人任大官而亡比君之治國也翼之臣所臣有羽翼之比為腹心之臣王不事而不四曰義五曰權六其權守其德不以蕩人故王人之厚其祿毋親毋故吏貞而平者上之不者表其閭君自至其家君唯有善有質子於殷周文王使伯邑巧死有詔必王食其肉免其血文王食其肉免其大公曰人聞其窮也恆人之請其所好惡同也昔親合在真者貞者急而刑使國王問太公曰吾勝殷呼胡為胡陽殷問太公曰於乎殷民從從為在建國立國事者用明知工疑者而御之則焉辟應去猶知曰二也波王良之御也使民乎故民心一也有道者之則馬也馬心一也有術者御之則馬正取其國不得免於危亡武王曰以別能大公曰厪之以名癘能武王曰何以遠者毋法為之奈何大公曰刑利國問太公曰為國文王召大公之乏乎大公曰下武王曰何謂大公曰也武王曰其而何大公大公曰正不平民不令其令不行如文王大警走門至之士拾君之揚君之善美養君之其民甚苦之毋所使誠為事以功擊為作禍福不可有王大公曰人有仁武王曰何謂大公曰上大夫皆得取其官爵莫不乎武王曰為之奈何大公曰上果何如而政何如而頃大公曰安在大公曰安不奈何大靡草如貴人而以為善者故其民善而不為惡矣武王曰分善惡奈何衆已故為國能知分善惡之分官以治為常三曰士以修身為常四曰
