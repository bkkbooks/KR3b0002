  - {type: variant, offset: 8, length: 0, content: '', SBCK: 王者舉兵三軍器用攻守之具科品衆寡豈有法乎太公曰大哉王之問也夫攻守之具各有科品此兵之大威也武王曰願聞之太公曰凡用兵之大數將甲士萬人法用武衝大扶胥三十六乗材士強弩矛㦸爲翼一車二十四人推之以八尺車輪車上立旗鼓兵法謂之震駭䧟堅陳敗強敵武翼大櫓矛㦸扶胥七十二具材士強弩矛㦸爲翼以五尺車輪絞車連弩自副䧟堅陳敗強敵提翼小櫓扶胥一百四十具絞車連弩自副以鹿車輪䧟堅陳敗強敵大黄參連弩大扶胥三十六乗材士強弩矛㦸爲翼飛鳬電影自副飛鳬赤莖白羽以銅爲首電影青莖赤羽以鐵爲首晝則以綘縞長六尺廣六寸爲光耀夜則以白縞長六尺廣六寸爲流星䧟堅陳敗歩􅀐大扶胥衝車三十六乗螳蜋武士共載可以縱擊橫可以敗敵輜車􅀐宼一名電車兵法謂之電擊䧟堅陳敗歩􅀐宼夜來前矛㦸扶胥輕車一百六十乗螳蜋武士三人共載兵法謂之霆擊䧟堅陳敗歩􅀐方首鐵棓維朌重十二斤柄長五尺以上千二百枚一名天棓大柯斧刃長八寸重八斤柄長五尺以上千二百枚一名天􅃏方首鐵鎚重八斤柄長五尺以上千二百枚一名天鎚敗歩􅀐羣宼飛鈎長八寸鈎芒長四寸柄長六尺以上千二百枚以投其衆三軍拒守木螳蜋劒刃扶胥廣二丈百二十具一名行馬平易地以歩兵敗車􅀐木蒺藜去地二尺五寸百二十具敗歩􅀐要窮宼遮走北軸旋短衝矛㦸扶胥百二十具黄帝所以敗􅃖尤氏敗歩􅀐要窮宼遮走北狹路微徑張鐵蒺藜芒髙四寸廣八寸長六尺以上千二百具敗歩􅀐突暝來前促戰白刃接張地羅鋪兩鏃蒺藜參連織女芒間相去二寸萬二千具曠野草中方􅇩鋋矛千二百具張鋋矛法髙一尺五寸敗歩􅀐要窮宼遮走北狹路微徑地䧟鐵械鎻參連百二十具敗歩􅀐要窮宼遮走北壘門拒守矛㦸小櫓十二具絞車連弩自副三軍拒守天羅虎落鎻連一部廣一丈五尺髙八尺百二十具虎落劒刃扶胥廣一丈五尺髙八尺五百二十具渡溝壍飛橋一間廣一丈五尺長二丈以上着轉􅀜轆轤八具以環利通索張之渡大水飛江廣一丈五尺長二丈以上八具以環利通索張之天浮鐵螳蜋矩内圎外徑四尺以上環絡自副三十二具以天浮張飛江濟大海謂之天潢一名天舡山林野居結虎落柴營環利鐵鎻長二丈以上千二百枚環利大通索大四寸長四丈以上六百枚環利中通索大二寸長四丈以上二百枚環利小徽縲長二丈以上萬二千枚天􅀨蓋重車上板結枲鉏鋙廣四尺長四丈以上車一具以鐵杙張之伐木大斧重八斤柄長三尺以上三百枚棨钁刃廣六寸柄長五尺以上三百枚銅築固爲垂長五尺以上三百枚鷹􅀲方􅇩鐵杷柄長七尺以上三百枚方􅇩鐵义柄長七尺以上三百枚方􅇩兩枝鐵义柄長七尺以上三百枚芟草木大鎌柄長七尺以上三百枚大櫓刀重八斤柄長六尺三百枚委環鐵杙長三尺以上三百枚㭬杙大鎚重五斤柄長二尺以上百二十具甲士萬人強弩六千㦸楯二千矛楯二千修治攻具砥礪兵器巧手三百人此舉兵軍用之大數也武王曰允哉三陳武王問太公曰凡用兵爲天陳地陳人陳奈何太公曰日月星辰斗杓一左一右一向一背此謂天陳丘陵水泉亦有前後左右之利此謂地陳用車用馬用文用武此謂人陳武王曰善哉疾戰武王問太公曰敵人圍我斷我前後絶我糧道爲之奈何太公曰此}
