  - {type: variant, offset: 10, length: 0, content: '', WYG: 之困兵也暴用之則勝徐用之則敗如此者為四武衝陣以武車驍騎驚亂其軍而疾擊之可以横行武王曰若已出圍地欲困以為勝為之奈何太公曰左軍疾左右軍疾右無與敵人爭道中軍迭前送後敵人雖衆其將可走必出第三十四武王問太公曰引兵深入諸侯之地敵人四合而圍我斷我歸道絶我糧食敵人既衆糧食甚多險阻又固我欲必出為之奈何太公曰必出之道器械為寳勇鬭為首審知敵人空虚之地無人之處可以必奮而出將士持𤣥旗操器械設銜枚夜岀勇力飛走冒將之士居前平壘為軍開道材士强弩為伏兵居後弱卒車騎居中陣必徐行慎無驚駭以武衝扶胥前後拒守武翼}
