  - {type: variant, offset: 10, length: 0, content: '', SBCK: 之困兵也暴用之則勝徐用之則敗如此者爲四武衝陳以武車驍􅀐驚亂其軍而疾擊之可以横行武王曰􅀂巳出圍地欲因以爲勝爲之奈何太公曰左軍疾左右軍疾右無與敵人爭道中軍迭前迭後敵人雖衆其將可走必出武王問太公曰引兵深入諸侯之地敵人四合而圍我斷我歸道絶我糧食敵人旣衆糧食甚多險阻又固我欲必出爲之奈何太公曰必出之道器械爲寶勇闘爲首審知敵人空虚之地無人之處可以必出將士人持􅀇旗操器械設銜枚夜出勇力飛足冒將之士居前平壘爲軍開道材士強弩爲伏兵居後弱卒車􅀐居中陳畢徐行愼無驚駭以武衝扶胥前後拒守武翼}
