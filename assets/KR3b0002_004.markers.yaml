  - {type: variant, offset: 8, length: 0, content: '', WYG: 王者舉兵三軍器用攻守之具科品衆寡豈有法乎太公曰大哉王之問也夫攻守之具各有科品此兵之大威也武王曰願聞之太公曰凡用兵之大數將甲士萬人法用武衛大扶胥三十六乘材士强弩矛㦸為翼一車二十四人推之以八尺車輪車上立旗鼓兵法謂之震駭陷堅陣敗强敵武翼大櫓矛㦸扶胥七十二具材士强弩矛㦸為翼以五尺車輪絞車連弩自副陷堅陣敗强敵提翼小櫓扶胥一百四十六具絞車連弩自副以鹿車輪陷堅陣敗强敵大黄參連弩大扶胥三十六乘材士强弩矛㦸為翼飛鳬電影自副飛鳬赤莖白羽以銅為首電影青莖赤羽以鐵為首晝則以絳縞長六尺廣六寸為光耀夜則以白縞長六尺廣六寸為流星陷堅陣敗步騎大扶胥衝車三十六乘螳螂武士共載可以擊縱横敗强敵輜車騎冦一名電光兵法謂之電擊陷堅陣敗歩騎冦夜來前矛㦸扶胥輕車一百六十乘螳螂武士三人共載兵法謂之霆擊陷堅陣敗歩騎方首鐡棓維朌重十二斤柄長五尺以上千二百枚一名天棓大柯斧刃長八寸重八斤柄長五尺以上千二百枚一名天鉞方首鐡槌重八斤柄長五尺以上千二百枚一名天槌敗歩騎羣冦飛鈎長八寸鈎芒長四寸柄長六尺以上千二百枚以投其衆三軍拒守木螳螂劒刃扶胥廣二丈百二十具一名行馬平易地以歩兵敗車騎木蒺藜去地二丈五尺百二十具敗歩騎要窮冦遮走北軸旋短衝矛㦸扶胥百二十具黄帝所以敗蚩尤氏敗歩騎要窮冦遮走北狹路微徑張鐡蒺藜芒髙四寸廣八寸長六尺以上千二百具敗走騎突瞑來前促戰白刃接張地羅鋪兩鏃蒺藜參連織女芒間相去二尺萬二千具曠林草中方胸鋌矛千二百具張鋌矛法髙一尺五寸敗走騎要窮冦遮走北狹路微徑地陷鐡械鎖參連百二十具敗歩騎要窮寇遮走北壘門拒守矛㦸小櫓十二具絞車連弩自副三軍拒守天羅虎落鎖連一部廣一丈五尺髙八尺百二十具虎落劒刃扶胥廣一丈五尺五百一十具渡溝塹飛橋一間廣一丈五尺長二丈以上着轉闗轆轤八具以環利通索張之渡大水飛江廣一丈五尺長二丈以上八具以環利通索張之天浮鐡螳螂短内圓外徑四尺以上環絡自副三十二具以天浮張飛江濟大海謂之天横一名天船山林野居結虎落柴營環利鐡鎖長二丈以上千二百具環利大通索大四寸長四丈以上六百枚環利中通索大二寸長四丈以上二百枚環利小徽縲長二丈以上萬二千枚大雨葢重車上板結泉鉏鋙廣四尺長四丈以上車一具以鐡杙張之伐木天斧重八斤柄長三尺以上三百枚棨钁刃廣六寸柄長五尺以上三百枚銅築固為􅂷長五尺以上三百枚鷹爪方胸鐡杷柄長七尺以上三百枚方胸鐡叉柄長七尺以上三百枚方胸兩枝鐡叉柄長七尺以上三百枚芟草木大鎌柄長七尺以上三百枚大櫓刃重八斤柄長六尺三百枚委環鐡杙長三尺以上三百枚㭬杙大槌重五斤柄長二尺以上百二十具甲士萬人强弩六千㦸櫓二千矛楯二千修治攻具砥礪兵器巧手三百人此舉兵用之大數也武王曰允哉三陣第三十二武王問太公曰凡用兵為天陣地陣人陣奈何太公曰日月星辰斗柄一左一右一向一背此為天陣丘陵水泉亦有前後左右之利此為地陣用車用馬用文用武此為人陣武王曰善哉疾戰第三十三武王問太公曰敵人圍我斷我前後絶我糧道為之奈何太公曰此}
