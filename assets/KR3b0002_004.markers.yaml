  - {type: variant, offset: 11, length: 0, content: '', WYG: 櫓以蔽左右敵人若驚勇力冒將之士疾擊而前弱卒車騎以屬其後材士强弩隠伏而處審候敵人追我伏兵疾擊其後多其火鼓若從地出若從天下三軍勇鬭莫我能禦武王曰前有大水廣塹深坑我欲踰渡無舟楫之備敵人屯守限我軍前塞我歸道斥􅕤常戒險塞盡守車騎要我前勇士擊我後為之奈何太公曰大水廣塹深坑敵人所不守或能守之其卒必寡若此者以飛江轉闗與天潢以濟吾軍勇力材士從我所指衝敵絶陣皆致其死先燔吾輜重燒吾糧食明告吏士勇鬭則生不勇則死已出令我踵軍設雲火遠候必依草木丘墓險阻敵人車騎必不敢逺追長驅因以火為記先出者令至火而止為四武衝陣如此則吾三軍皆精鋭勇鬭莫我能止武王曰善哉軍略第三十五武王問太公曰引兵深入諸侯之地遇深溪大谷險阻之水吾三軍未得畢濟而天暴雨流水大至後不得屬于前無舟梁之備又無水草之資吾欲畢濟使三軍不稽留為之奈何太公曰凡帥師將衆慮不先設器械不備教不精信士卒不習若此不可以為王者之兵也凡三軍有大事莫不習用器械若攻城圍邑則有轒輼臨衝視城中則有雲梯飛樓三軍行止則有武衝大櫓前後拒守絶道遮街則有材士强弩衛其兩旁設營壘則有天羅武落行馬疾藜畫則登雲梯逺望立五色旌旗夜則設雲火萬炬擊雷鼔振鼙鐸吹鳴笳越溝塹則有飛橋轉闗轆轤鉏鋙濟大水則有天潢飛江逆波上流則有浮海絶江三軍用備主將何憂臨境第三十六武王問太公曰吾與敵人臨境相拒彼可以來我可以往陣皆堅固莫敢先舉我欲往而襲之彼亦可以來為之奈何太公曰分兵三處令我前軍深溝増壘而無出列旌旗擊鼙鼓完為守備令我後軍多積糧食無使敵人知我意發我鋭士潛襲其中擊其不意攻其無備敵人不知我情則知我來矣武王曰敵人知我之情通我之機動則得我事其鋭士伏於深草要我隘路擊我便處為之奈何太公曰令我前軍日出挑戰以勞其意令我老弱曳柴揚塵鼓呼而往來或出其左或出其右去敵無過百步其將必勞其卒必駭如此則敵人不敢來吾往者不止或襲其内或擊其外三軍疾戰敵人必敗動靜第三十七武王問太公曰引兵深入諸侯之地與敵之軍相當兩陣相望衆寡强弱相等未敢先舉吾欲令敵人將帥恐懼士卒心傷行陣不固後陣欲走前陣數顧鼔譟而乘之敵人遂走為之奈何太公曰如此者𤼵我兵去冦十里而伏其兩旁車騎百里而越其前後多其旌旗益其金鼔戰合鼔譟而俱起敵將必恐其軍驚駭衆寡不相救貴賤不相待敵人必敗武王曰敵之地勢不可以伏其兩旁車騎又無以越其前後敵知我慮先施其備吾士卒心傷將帥恐懼戰則不勝為之奈何太公曰誠哉王之問也如此者先戰五日𤼵我逺候往視其動靜審候其來設伏而待之必於死地與敵相避逺我旌旗疏我行陣必奔其前與敵相當戰合而走擊金而止三里而還伏兵乃起或陷其兩旁或擊其前後三軍疾戰敵人必走武王曰善哉金鼔第三十八武王問太公曰引兵深入諸侯之地與敵相當而天大寒甚暑日夜霖雨旬日不止溝壘悉壊隘塞不守斤堠懈怠士卒不戒敵人夜來三軍無備上下惑亂為之奈何太公曰凡三軍以戒為固以怠為敗令我壘上誰何不絶人執旌旗外内相望以號相命勿令乏音而皆外向三千人為一屯誡而約之各愼其處敵人若來視我軍之警戒至而必還力盡氣怠𤼵我鋭士隨而擊之武王曰敵人知我隨之而伏其鋭士佯北不止遇伏而還或擊我前或擊我後或薄我壘吾三軍大恐擾亂失次離其處所為之奈何太公曰分為三隊隨而追之勿越其伏三隊俱全或擊其前後或陷其兩旁明號審令疾擊而前敵人必敗絶道第三十九武王問太公曰引兵深入諸侯之地與敵相守敵人絶我糧道又越我前後吾欲戰則不可勝欲守則不可乆為之奈何太公曰凡深入敵人之境必察地之形勢務求便利依山林險阻水泉林木而為之固謹守闗梁又知城邑丘墓地形之利如是則我軍堅固敵人不能絶我糧道又不能越我前後武王曰吾三軍過大林廣澤平易之地吾候望誤失卒與敵人相薄以戰則不勝以守則不固敵人翼我兩旁越我前後三軍大恐為之奈何太公曰凡帥師之法當先𤼵逺候去敵二十里審知敵人之所在地勢不便則以武衝為壘而前又置兩踵軍於後逺者百里近者五十里即有警急前後相知吾三軍常完堅必無毁傷武王曰善哉略地第四十武王問太公曰戰勝深入略其地有大城不可下其别軍守險與我相拒我欲攻城圍邑恐其别軍卒至而薄我中外相合擊我表裏三軍大亂上下恐駭為之奈何太公曰凡攻城圍邑車騎必逺屯衛警戒阻其外内中人絶糧外不得輸城人恐怖其將必降武王曰中人絶糧外不得輸隂為約誓相與宻謀夜出窮冦死戰其車騎銳士或衝我内或擊我外士卒迷惑三軍敗亂為之奈何太公曰如此者當分為三軍謹視地形而處審知敵人别軍所在及其大城别堡為之置遺缺之道以利其心謹備勿失敵人恐懼不入山林即歸大邑走其别軍車騎逺要其前勿令遺脫中人以為先出者得其徑道其練卒材士必出其老弱獨在車騎深入長驅敵人之軍必莫敢出慎勿與戰絶其糧道圍而守之必久其日無燔人積聚無毁人宫室冢樹社叢勿伐降者勿殺得者勿戮示之以仁義施之以厚徳令其士民曰罪在一人如此則天下和服武王曰善哉火戰第四十一武王問太公曰引兵深入諸侯之地遇深草蓊穢周吾軍前後左右三軍行數百里人馬疲倦休止敵人因天燥疾風之利燔吾上風車騎銳士堅伏吾後三軍恐怖散亂而走為之奈何太公曰若此者則以雲梯飛樓逺望左右謹察前後見火起即燔吾前而廣延之又燔吾後敵人茍至即引軍而却按黒地而堅處敵人之來猶在吾後見火起必逺走吾按黒地而處强弩材士衛吾左右又燔吾前後若此則敵人不能害我武王曰敵人燔吾左右又燔吾前後烟覆吾軍其大兵按黒地而起為之奈何太公曰若此者為四武衝陣强弩翼吾左右其法無勝亦無負壘虚第四十二武王問太公曰何以知敵壘之虚實自來自去太公曰將必上知天道下知地理中知人事登髙下望以觀敵之變動望其壘則知其虚實望其士卒則知其來去武王曰何以知之太公曰聽其鼓無音鐸無聲望其壘上多飛鳥而不驚上無氛氣必知敵詐而為偶人也敵人卒去不逺未}
