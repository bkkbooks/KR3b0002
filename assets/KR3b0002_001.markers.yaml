  - {type: variant, offset: 62, length: 0, content: '', krp: 問太公曰兵道如何太公曰凡兵之道莫過乎一一者能獨往獨來黄帝曰一者階於道幾於神用之在於機顯之在於勢成之在於君故聖王號兵爲凶器不得巳而用之今商王知存而不知亡知樂而不知殃夫存者非存在於慮亡樂者非樂在於慮殃今王巳慮其源豈憂其流乎武王曰兩軍相遇彼不可來此不可往各設固備未敢先發我欲襲之不得其利爲之奈何太公曰外亂而内整示飢而實飽内精而外鈍一合一離一聚一散隂其謀密其機髙其壘伏其銳士寂若無聲敵不知我所備欲其西襲其東武王曰敵知我情通我謀爲之奈何太公曰兵}
