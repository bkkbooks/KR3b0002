  - {type: variant, offset: 32, length: 28, content: 貴第八方以禮義為國第十第十二第十三舜伐有苗武大失第十四方, SBCK: 聞見則所不聞見者莫不隂化矣夫誠暢於天地通於神明而况於人乎兵道}
