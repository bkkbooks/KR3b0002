  - {type: variant, offset: 43, length: 0, content: '', WYG: 一文王問太公曰賞所以存勸罰所以存懲吾欲賞一以勸百罰一以懲衆為之奈何太公曰凡用賞者貴信用罰者貴必賞信罰必於耳目之所聞見則所不聞見者莫不陰化矣夫誠暢于天地通于神明而况於人乎兵道}
