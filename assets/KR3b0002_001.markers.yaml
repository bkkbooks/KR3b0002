  - {type: variant, offset: 0, length: 4, content: 竹簡篇題, WYG: 文王將田史編布卜曰田於渭陽將大得焉非龍非彲非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王曰兆致是乎史編曰編之太祖史疇為舜占得皋陶兆比於此文王乃齋三日乘田車駕田馬田於渭陽卒見太公坐茅以漁文王勞而問之曰子樂漁耶太公曰君子樂得其志小人樂得其事今吾漁甚有似也文王曰何謂其有似也太公曰釣有三權祿等以權死等以權官等以權夫釣以求得也其情深可以觀大矣文王曰願聞其情太公曰源深而水流水流而魚生之情也根深而木長木長而實生之情也君子情同而親合親合而事生之情也言語應對者情之飾也言至情者事之極也今臣言至情不諱君其惡之乎文王曰惟仁人能受正諫不惡至情何為其然太公曰緡微餌明小魚食之緡綢餌香中魚食之緡隆餌豐大魚食之夫魚食其餌乃牽於緡人食其祿乃服于君故以餌取魚魚可殺以祿取人人可竭以家取國國可抜以國取天下天下可畢嗚呼曼曼緜緜其聚必散嘿嘿昧昧其光必逺微哉聖人之徳誘乎獨見樂哉聖人之慮各歸其次而立斂焉文王曰立歛何若而天下歸之太公曰天下非一人之天下乃天下之天下也同天下之利者則得天下擅天下之利者則失天下天有時地有財能與人共之者仁也仁之所在天下歸之免人之死解人之難救人之患濟人之急者徳也徳之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下赴之凡人惡死而樂生好徳而歸利能生利者道也道之所在天下歸之文王再拜曰允哉敢不受天之詔命乎乃載與俱歸立為師盈虚第二文王問太公曰天下熙熙一盈一虛一治一亂所以然者何也其君賢不肖不等乎其天時變化自然乎太公曰君不肖則國危而民亂君賢聖則國安而民治禍福在君不在天時文王曰古之賢聖可得聞乎太公曰昔者帝堯之王天下上世所謂賢君也文王曰其治如何太公曰帝堯王天下之時金銀珠玉不飾錦繡文綺不衣奇怪珍異不視玩好之器不寳淫佚之樂不聽宫垣屋室不堊甍桷椽楹不斲茅茨徧庭不剪鹿裘禦寒布衣掩形糲粱之飯藜藿之羮不以役作之故害民耕織之時削心約志從事於無為吏忠正奉法者尊其位廉潔愛人者原其祿民有孝慈者愛敬之盡力農桑者慰勉之旌别淑慝表其門閭平心正節以法度禁邪偽所憎者有功必賞所愛者有罪必罰存養天下鰥寡孤獨賑贍禍亾之家其自奉也甚薄其賦役也甚寡故萬民富樂而無饑寒之色百姓戴其君如日月親其君如父母文王曰大哉賢徳之君也國務第三文王問太公曰願聞為國之大務欲使主尊人安為之奈何太公曰愛民而已文王曰愛民奈何太公曰利而勿害成而勿敗生而勿殺予而勿奪樂而勿苦喜而勿怒文王曰敢請釋其故太公曰民不失務則利之農不失時則成之不罰無罪則生之薄賦歛則與之儉宫室臺榭則樂之吏清不苛擾則喜之民失其務則害之農失其時則敗之無罪而罰則殺之重賦歛則奪之多營宮室臺榭以疲民力則苦之吏濁苛擾則怒之故善為國者馭民如父母之愛子如兄之愛弟見其饑寒則為之憂見其勞苦則為之悲賞罰如加於身賦歛如取諸己此愛民之道也大禮第四文王問太公曰君臣之禮如何太公曰為上惟臨為下惟沉臨而無逺沉而無隠為上惟周為下惟定周則天也定則地也或天或地大禮乃成文王曰主位如何太公曰安徐而靜柔節先定善與而不爭虚心平志待物以正文王曰主聽如何太公曰勿妄而許勿逆而拒許之則失守拒之則閉塞髙山仰止不可極也深淵度之不可測也神明之徳正靜其極文王曰主明如何太公曰目貴明耳貴聰心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也輻輳並進則明不蔽矣明傳第五文王寢疾召太公望太子𤼵在側曰嗚呼天將棄予周之社稷將以屬汝今予欲師至道之言以明傳之子孫太公曰王何所問文王曰先聖之言其所止其所起可得聞乎太公曰見善而怠時至而疑知非而處此三者道之所止也柔而靜恭而敬强而弱忍而剛此四者道之所起也故義勝欲則昌欲勝義則亡敬勝怠則吉怠勝敬則滅六守第六文王問太公曰君國主民者其所以失之者何也太公曰不謹所與也人君有六守三寶文王曰六守者何也太公曰一曰仁二曰義三曰忠四曰信五曰勇六曰謀是謂六守文王曰謹擇六守者何太公曰富之而觀其無犯貴之而觀其無驕付之而觀其無轉使之而觀其無隠危之而觀其無恐事之而觀其無窮富之而不犯者仁也貴之而不驕者義也付之而不轉者忠也使之而不隠者信也危之而不恐者勇也事之而不窮者謀也人君無以三寶借人借人則君失其威文王曰敢問三寶太公曰大農大工大商謂之三寶農一其鄉則國足工一其鄉則器足商一其鄉則貨足三寶各安其處民乃不慮無亂其鄉無亂其族臣無富于君都無大于國六守長則君昌三寶全則國安守土第七文王聞太公曰守土奈何太公曰無疏其親無怠其衆撫其左右御其四旁無借人國柄借人國柄則失其權無掘壑而附丘無舎本而治末日中必彗操刀必割執斧必伐日中不彗是謂失時操刀不割失利之期執斧不伐賊人將來涓涓不塞將為江河熒熒不救炎炎奈何兩葉不去將用斧柯是故人君必從事於富不富無以為仁不施無以合親疏其親則害失其衆則敗無借人利器借人利器則為人所害而不終其世文王曰何謂仁義太公曰敬其衆合其親敬其衆則和合其親則喜是謂仁義之紀無使人奪汝威因其明順其常順者任之以徳逆者絶之以力敬之勿疑天下和服守國第八文王問太公曰守國奈何太公曰齋將語君天地之經四時所生仁聖之道民機之情王齋七日北面再拜而問之太公曰天生四時地生萬物天下有民聖人牧之故春道生萬物榮夏道長萬物成秋道歛萬物盈冬道藏萬物靜盈則藏藏則復起莫知所終莫知所始聖人配之以為天地經紀故天下治仁聖藏天下亂仁聖昌至道其然也聖人之在天地間也其寶固大矣因其常而視之則民安夫民動而為機機動而得失爭矣故𤼵之以其陰會之以其陽為之先倡而天下和之極反其常莫進而爭莫退而遜守國如此與天地同光上賢第九文王問太公曰王人者何上何下何取何去何禁何止太公曰上賢下不肖取誠信去詐偽禁暴亂止奢侈故王人者有六賊七害文王曰願聞其道太公曰夫六賊者一曰臣有大作宫室池榭遊觀倡樂者傷王之徳二曰民有不事農桑任氣游俠犯厯法禁不從吏教者傷王之化三曰臣有結朋黨蔽賢智障主明者傷王之權四曰士有抗志髙節以為氣勢外交諸侯不重其主者傷王之威五曰臣有輕爵位賤有司羞為上犯難者傷功臣之勞六曰强宗侵奪陵武貧弱傷庶人之業七害者一曰無智略權謀而重賞尊爵之故强勇輕戰僥倖于外王者謹勿使為將二曰有名無實出入異言掩善揚惡進退為巧王者謹勿與謀三曰朴其身躬惡其衣食語無為以求名言無欲以求利此偽人也王者謹勿近四曰奇其冠帶偉其衣服博聞辨辭虚論髙議以為容美窮居靜處而誹時俗此姦人也王者謹勿寵五曰讒佞茍得以求官爵果敢輕死以貪祿秩不圖大事貪利而動以髙談虚論說於人主王者謹勿使六曰為雕文刻鏤技巧華飾而傷農事王者必禁七曰偽方異技巫蠱左道不祥之言幻惑良民王者必止之故民不盡力非吾民也士不誠信非吾士也臣不忠諫非吾臣也吏不平潔愛人非吾吏也相不能富國强兵調和陰陽以安萬乘之主正羣臣定名實明賞罰樂萬民非吾相也夫王者之道如龍首髙居而逺望深視而審聽示其形隠其情若天之髙不可極也若淵之深不可測也故可怒而不怒姦臣乃作可殺而不殺大賊乃𤼵兵勢不行敵國乃强文王曰善哉舉賢第十文王問太公曰君務舉}
