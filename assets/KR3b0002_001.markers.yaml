  - {type: variant, offset: 0, length: 4, content: 竹簡篇題, krp: 六韜卷第一文韜文師文王將田史編布卜曰田於渭陽將大得焉非龍非彲非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王曰兆致是乎史編曰編之太祖史疇爲禹占得臯陶兆比於此文王乃齋三日乗田車駕田馬田於渭陽卒見太公坐茅以漁文王勞而問之曰子樂漁邪太公曰臣聞君子樂得其志小人樂得其事今吾漁甚有似也殆非樂之也文王曰何謂其有似也太公曰釣有三權禄等以權死等以權官等以權夫釣以求得也其情深可以觀大矣文王曰願聞其情太公曰源深而水流水流而魚生之情也根深而木長木長而實生之情也君子情同而親合親合而事生之情也言語應對者情之飾也言至情者事之極也今臣言至情不諱君其惡之乎文王曰唯仁人能受至諫不惡至情何爲其然太公曰緡微餌明小魚食之緡調餌香中魚食之緡隆餌豐大魚食之夫魚食其餌乃牽於緡人食其禄乃服於君故以餌取魚魚可殺以禄取人人可竭以家取國國可拔以國取天下天下可畢嗚呼曼曼緜緜其聚必散嘿嘿昧昧其光必逺微哉聖人之德誘乎獨見樂哉聖人之慮各歸其次而樹斂焉文王曰樹斂何若而天下歸之太公曰天下非一人之天下乃天下之天下也同天下之利者則得天下擅天下之利者則失天下天有時地有財能與人共之者仁也仁之所在天下歸之免人之死解人之難救人之患濟人之急者德也德之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下赴之凡人惡死而樂生好德而歸利能生利者道也道之所在天下歸之文王再拜曰允哉敢不受天之詔命乎乃載與俱歸立爲師盈虚文王問太公曰天下熙熙一盈一虚一治一亂所以然者何也其君賢不肖不等乎其天時變化自然乎太公曰君不肖則國危而民亂君賢聖則國安而民治禍福在君不在天時文王曰古之賢君可得聞乎太公曰昔者帝堯之王天下上世所謂賢君也文王曰其治如何太公曰帝堯王天下之時金銀珠玉不飾錦繡文綺不衣竒怪珍異不視玩好之器不寶淫泆之樂不聽宫垣屋室不堊甍桷椽楹不斵茅茨徧庭不剪鹿裘禦寒布衣掩形糲粱之飯藜藿之羮不以役作之故害民耕績之時削心約志從事乎無爲吏忠正奉法者尊其位廉㓗愛人者厚其禄民有孝慈者愛敬之盡力農桑者慰勉之旌别淑德表其門閭平心正節以法度禁邪僞所憎者有功必賞所愛者有罪必罰存養天下鰥寡孤獨振贍禍亡之家其自奉也甚薄其賦役也甚寡故萬民富樂而無飢寒之色百姓戴其君如日月親其君如父母文王曰大哉賢君之德也國務文王問太公曰願聞爲國之大務欲使主尊人安爲之奈何太公曰愛民而巳文王曰愛民奈何太公曰利而勿害成而勿敗生而勿殺與而勿奪樂而勿苦喜而勿怒文王曰敢請釋其故太公曰民不失務則利之農不失時則成之省刑罰則生之薄賦斂則與之儉宫室臺榭則樂之吏清不苛擾則喜之民失其務則害之農失其時則敗之無罪而罰則殺之重賦斂則奪之多營宫室臺榭以疲民力則苦之吏濁苛擾則怒之故善爲國者馭民如父母之愛子如兄之愛弟見其飢寒則爲之憂見其勞苦則爲之悲賞罰如加於身賦斂如取己物此愛民之道也大禮文王問太公曰君臣之禮如何太公曰爲上唯臨爲下唯沈臨而無逺沈而無隱爲上唯周爲下唯定周則天也定則地也或天或地大禮乃成文王曰主位如何太公曰安徐而靜柔節先定善與而不爭虚心平志待物以正文王曰主聽如何太公曰勿妄而許勿逆而担許之則失守拒之則閉塞髙山仰之不可極也深淵度之不可測也神明之德正靜其極文王曰主明如何太公曰目貴明耳貴聦心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也輻湊並進則明不蔽矣明傳文王寢疾召太公望太子發在側曰嗚呼天將棄予周之社稷將以屬汝今予欲師至道之言以明傳之子孫太公曰王何所問文王曰先聖之道其所止其所起可得聞乎太公曰見善而怠時至而疑知非而處此三者道之所止也柔而靜恭而敬強而弱忍而剛此四者道之所起也故義勝欲則昌欲勝義則亡敬勝怠則吉怠勝敬則滅六守文王問太公曰君國主民者其所以失之者何也太公曰不愼所與也人君有六守三寳文王曰六守何也太公曰一曰仁二曰義三曰忠四曰信五曰勇六曰謀是謂六守文王曰愼擇六守者何太公曰富之而觀其無犯貴之而觀其無驕付之而觀其無轉使之而觀其無隱危之而觀其無恐事之而觀其無窮富之而不犯者仁也貴之而不驕者義也付之而不轉者忠也使之而不隱者信也危之而不恐者勇也事之而不窮者謀也人君無以三寳借人借人則君失其威文王曰敢問三寳太公曰大農大工大商謂之三寳農一其郷則穀足工一其郷則器足商一其郷則貨足三寳各安其處民乃不慮無亂其郷無亂其族臣無富於君都無大於國六守長則君昌三寳完則國安守土文王問太公曰守士奈何太公曰無䟽其親無怠其衆撫其左右御其四旁無借人國柄借人國柄則失其權無掘壑而附丘無舎本而治末日中必彗操刀必割執斧必伐日中不彗是謂失時操刀不割失利之期執斧不伐賊人將來㳙㳙不塞將爲江河熒熒不救炎炎奈何兩葉不去將用斧柯是故人君必從事於冨不富無以爲仁不施無以合親䟽其親則害失其衆則敗無借人利器借人利器則爲人所害而不終其正也王曰何謂仁義太公曰敬其衆合其親敬其衆則和合其親則喜是謂仁義之紀無使人奪汝威因其明順其常順者任之以德逆者絶之以力敬之無疑天下和服守國文王問太公曰守國奈何太公曰齋將語君天地之經四時所生仁聖之道民機之情王即齋七日北面再拜而問之太公曰天生四時地生萬物天下有民仁聖牧之故春道生萬物榮夏道長萬物成秋道斂萬物盈冬道藏萬物㝷盈則藏藏則復起莫知所終莫知所始聖人配之以爲天地經紀故天下治仁聖藏天下亂仁聖昌至道其然也聖人之在天地間也其寶固大矣因其常而視之則民安夫民動而爲機機動而得失爭矣故發之以其隂㑹之以其陽爲之先唱天下和之極反其常莫進而爭莫退而讓守國如此與天地同光上賢文王問太公曰王人者何上何下何取何去何禁何止太公曰王人者上賢下不肖取誠信去詐僞禁暴亂止奢侈故王人者有六賊七害文王曰願聞其道太公曰夫六賊者一曰臣有大作宫室池榭遊觀倡樂者傷王之德二曰民有不事農桑任氣遊俠犯歴法禁不從吏敎者傷王之化三曰臣有結朋黨蔽賢智鄣主明者傷王之權四曰士有抗志髙節以爲氣勢外交諸侯不重其主者傷王之威五曰臣有輕爵位賤有司羞爲上犯難者傷功臣之勞六曰強宗侵奪陵侮貧弱者傷庶人之業七害者一曰無智略權謀而以重賞尊爵之故強勇輕戰僥倖於外王者愼勿使爲將二曰有名無實出入異言掩善揚惡進退爲巧王者愼勿與謀三曰朴其身躬惡其衣服語無爲以求名言無欲以求利此僞人也王者愼勿近四曰竒其冠帶偉其衣服愽聞辯辭虚論髙議以爲容羙窮居靜處而誹時俗此姦人也王者愼勿寵五曰讒佞苟得以求官爵果敢輕死以貪禄秩不圖大事得利而動以髙談虚論說於人主王者愼勿使六曰爲雕文刻鏤技巧華飾而傷農事王者必禁之七曰僞方異伎巫蠱左道不祥之言幻惑良民王者必止之故民不盡力非吾民也士不誠信非吾士也臣不忠諫非吾臣也吏不平㓗愛人非吾吏也相不能富國強兵調和隂陽以安萬乗之主正羣臣定名實明賞罰樂萬民非吾相也夫王者之道如龍首髙居而逺望深視而審聽示其形隱其情若天之髙不可極也若淵之深不可測也故可怒而不怒姦臣乃作可殺而不殺大賊乃發兵勢不行敵國乃強文王曰善哉舉賢文王問太公曰君務舉}
