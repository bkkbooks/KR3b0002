  - {type: variant, offset: 62, length: 0, content: '', SBCK: 問太公曰兵道如何太公曰凡兵之道莫過乎一一者能獨往獨來黄帝曰一者階於道幾於神用之在於機顯之在於勢成之在於君故聖王號兵爲凶器不得巳而用之今商王知存而不知亡知樂而不知殃夫存者非存在於慮亡樂者非樂在於慮殃今王巳慮其源豈憂其流乎武王曰兩軍相遇彼不可來此不可往各設固備未敢先發我欲襲之不得其利爲之奈何太公曰外亂而内整示飢而實飽内精而外鈍一合一離一聚一散隂其謀密其機髙其壘伏其銳士寂若無聲敵不知我所備欲其西襲其東武王曰敵知我情通我謀爲之奈何太公曰兵}
  - {type: page-break, offset: 62, content: '', id: KR3b0002_SBCK_001-9b}
  - {type: variant, offset: 62, length: 0, content: '', WYG: 問太公曰兵道何如太公曰凡兵之道莫過乎一一者能獨往獨來黄帝曰一者階于道幾于神用之在于機顯之在于勢成之在於君故聖王號兵為凶器不得已而用之今商王知存而不知亡知樂而不知殃夫存者非存在于慮亡樂者非樂在于慮殃今王已慮其源豈憂其流乎武王曰兩軍相遇彼不可來此不可往各設固備未敢先𤼵我欲襲之不得其利為之奈何太公曰外亂而内整示饑而實飽内精而外鈍一合一離一聚一散陰其謀宻其機髙其壘伏其銳士寂若無聲敵不知我所備欲其西襲其東武王曰敵知我情通我謀為之奈何太公曰兵}
