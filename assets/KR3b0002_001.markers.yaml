  - {type: variant, offset: 9, length: 5, content: 仁第四方治, SBCK: 而不用是有舉賢之名而無用賢之實也文王曰其失安在太公曰其失在君好用世俗之所譽而不得眞賢也文王曰何如太公曰君以世俗之所譽者爲賢以世俗之所毁者爲不肖則多黨者進少黨者退若是則羣邪此周而蔽賢忠臣死於無罪姦臣以虚譽取爵位是以世亂愈甚則}
