  - {type: variant, offset: 6, length: 0, content: '', SBCK: 所謂鳥雲者鳥散而雲合變化無窮者也武王曰善哉少衆武王問太公曰吾欲以少擊衆以弱擊彊爲之柰何太公曰以少擊衆者}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 所謂烏雲者烏散而雲合變化無窮者也武王曰善哉少衆第四十九武王問太公曰吾欲以少擊衆以弱擊强為之奈何太公曰以少擊衆者}
  - {type: variant, offset: 6, length: 0, content: '', krp: 所謂鳥雲者鳥散而雲合變化無窮者也武王曰善哉少衆武王問太公曰吾欲以少擊衆以弱擊彊爲之柰何太公曰以少擊衆者}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 以日之暮伏於深草要之隘路以弱擊彊者必得大􅀦而與隣國之助武王曰我無深草又無隘路敵人已至不適日暮我無大國之與又無隣國之助爲之柰何太公曰妄張詐誘以熒惑其將迂其道令過深草逺其路令會日路前}
  - {type: page-break, offset: 7, content: '', id: KR3b0002_SBCK_005-5b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 以日之暮伏於深草要之隘路以弱擊强者必得大國之與鄰國之助武王曰我無深草又無隘路敵人已至不適日暮我無大國之與又無鄰國之助為之奈何太公曰妄張詐誘以熒惑其將迂其途令過深草逺其路令會日暮前}
  - {type: page-break, offset: 7, content: '', id: KR3b0002_WYG_005-6b, image: WYG0726/WYG0726-0037b.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 以日之暮伏於深草要之隘路以弱擊彊者必得大國而與隣國之助武王曰我無深草又無隘路敵人已至不適日暮我無大國之與又無隣國之助爲之柰何太公曰妄張詐誘以熒惑其將迂其道令過深草逺其路令會日路前}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 未渡水後行未及舎發我伏兵疾擊其左右車􅀐擾亂其前後敵人雖衆其將可走事大國之君下鄰國之士厚其幣卑其辭如此則得大國之與鄰􅀦之助矣武王曰善哉分險武王問太公曰引兵深入諸侯之地與敵人相遇於險阨之中吾左山而右水敵右山而左水與我分險相拒各欲以守則固以戰則勝爲之柰何太公曰處山之左急備山之右處山之右急備山之左險有大水無舟楫}
  - {type: page-break, offset: 8, content: '', id: KR3b0002_SBCK_005-6a}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 未渡水後行未及舎𤼵我伏兵疾擊其左右車騎擾亂其前後敵人雖衆其將可走事大國之君下鄰國之士厚其幣卑其辭如此則得大國之與鄰國之助矣武王曰善哉分險第五十武王問太公曰引兵深入諸侯之地與敵人相遇於險阨之中吾左山而右水敵右山而左水與我分險相拒吾欲以守則固以戰則勝為之奈何太公曰處山之左急備山之右處山之右急備山之左險有大水無舟楫}
