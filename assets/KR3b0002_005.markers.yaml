  - {type: variant, offset: 5, length: 0, content: '', SBCK: 列巳定士卒巳陳法令巳行竒正巳設各置衝陳於山之表便兵所處乃分車􅀐爲鳥雲之陳三軍疾戰敵人雖衆其將可擒鳥雲澤兵武王問太公曰引兵深入諸侯之地與敵人臨水相拒敵富而衆我貧而寡踰水擊之則不能前欲久其日則糧食少吾居斥鹵之地四旁無邑又無草木三軍無所掠取牛馬無所芻牧爲之奈何太公曰三軍無備牛馬無食士卒無糧如此者索便詐敵而亟去之設伏兵於後武王曰敵不可得而詐吾士卒迷惑敵人越我前後吾三軍敗亂而走爲之奈何太公曰求途之道金玉爲主必因敵使精微爲寶武王曰敵人知我伏兵大軍不肯濟别將分隊以踰於水吾三軍大恐爲之奈何太公曰如此者分爲衝陳便兵所處湏其畢出發我伏兵疾擊其後強弩兩旁射其左右車􅀐分爲鳥雲之陳備其前後三軍疾戰敵人見我戰合其大軍必濟水而來發我伏兵疾擊其後車􅀐衝其左右敵人雖衆其將可走凡用兵之大要當敵臨戰必宜衝陣便兵所處然後以軍􅀐分爲鳥雲之陳此用兵之竒}
