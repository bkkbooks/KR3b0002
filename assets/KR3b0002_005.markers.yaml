  - {type: page-break, offset: 5, content: '', id: KR3b0002_SBCK_005-5a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 列已定士卒已陣法令已行奇正已設各置衝陣於山之表便兵所處乃分車騎為烏雲之陣三軍疾戰敵人雖衆其將可擒烏雲澤兵第四十八武王問太公曰引兵深入諸侯之地與敵人臨水相拒敵富而衆我貧而寡踰水擊之則不能前欲久其日則糧食少吾居斥鹵之地四旁無邑又無草木三軍無所掠取牛馬無所芻牧為之奈何太公曰三軍無備牛馬無食士卒無糧如此者索便詐敵而亟去之設伏兵於後武王曰敵不可得而詐吾士卒迷惑敵人越我前後吾三軍敗而走為之奈何太公曰求途之道金玉為主必因敵使精微為寳武王曰敵人知我伏兵大軍不肻濟别將分隊以踰于水吾三軍大恐為之奈何太公曰如此者分為衝陣便兵所處須其畢出𤼵其伏兵疾擊其後强弩兩旁射其左右車騎分為烏雲之陣備其前後三軍疾戰敵人見我戰合其大軍必濟水而來𤼵我伏兵疾擊其後車騎衝其左右敵人雖衆其將可走凡用兵之大要當敵臨戰必置衝陣便兵所處然後以車騎分為烏雲之陣此用兵之奇}
