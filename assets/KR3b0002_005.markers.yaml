  - {type: variant, offset: 4, length: 0, content: '', WYG: 知敵人所在或擊其表裏微號相知令之滅火鼓音皆止中外相應期約相當三軍疾戰敵必敗亡武王曰善哉敵武第四十六武王問太公曰引兵深入諸侯之地卒遇敵人甚衆且武武車驍騎繞我左右吾三軍皆震走不可止為之奈何太公曰如此者謂之敗兵善者以勝不善者以亡武王曰為之奈何太公曰伏我將士强弩武車驍騎為之左右當去前後三里敵人逐我𤼵我車騎衝其左右如此則敵人擾亂吾走者自止武王曰敵人與我車騎相當敵衆我少敵强我弱其來整治精鋭吾陣不敢當為之奈何太公曰選我材士强弩伏于左右車騎堅陣而處敵人過我伏兵積弩射其左右車騎銳兵疾擊其軍或擊其前或擊其後敵人雖衆其將必走武王曰善哉烏雲山兵第四十七武王問太公曰引兵深入諸侯之地遇髙山盤石其上亭亭無有草木四面受敵吾三軍恐懼士卒迷惑吾欲以守則固以戰則勝為之奈何太公曰凡三軍處山之髙則為敵所棲處山之下則為敵所囚既以被山而處必為烏雲之陣烏雲之陣陰陽皆備或屯其陰或屯其陽處山之陽備山之陰處山之陰備山之陽處山之左備山之右處山之右備山之左敵所能陵者兵備其表衢道通谷絶以武車髙置旌旗謹勅三軍無使敵人知吾之情是謂山城}
