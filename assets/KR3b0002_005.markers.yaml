  - {type: variant, offset: 0, length: 0, content: '', WYG: 六韜卷四欽定四庫全書六韜卷五豹韜林戰第四十三武王問太公曰引兵深入諸侯之地遇大林與敵人分林相拒吾欲以守則固以戰則勝為之奈何太公曰使吾三軍分為衝陣便兵所處弓弩為表㦸楯為裏斬除草木極廣吾道以便戰所髙置旌旗謹勅三軍無使敵人知吾之情是謂林戰林戰之法率吾矛㦸相與為伍林間木疎以騎為輔戰車居前見便則戰不見便則止林多險阻必置衝陣以備前後三軍疾戰敵人雖衆其將可走更戰更息各按其部是謂林戰之紀突戰第四十四武王問太公曰敵人深入長驅侵掠我地驅我牛馬其三軍大至薄我城下吾士卒大恐人民繫累為敵所虜吾欲以守則固以戰則勝為之奈何太公曰如此者謂之突兵其牛馬必不得食士卒絶糧暴擊而前令我逺邑别軍選其銳士疾擊其後審其期日必會於晦三軍疾戰敵人雖衆其將可虜武王曰敵人分為三四或戰而侵掠我地或止而收我牛馬其大軍未盡至而使冦薄我城下致吾三軍恐懼為之奈何太公曰謹候敵人未盡至則設備以待之去城四里而為壘金鼓旌旗皆列而張别隊為伏兵令我壘上多積强弩百步一突門門有行馬車騎居外勇力銳士隠伏而處敵人若至使我輕卒合戰而佯走令我城上立旌旗擊鼙鼓完為守備敵人以我為守城必薄我城下𤼵吾伏兵以衝其内或擊其外三軍疾戰或擊其前或擊其後勇者不得鬬輕者不及走名曰突戰敵人雖衆其將必走武王曰善哉敵强第四十五武王問太公曰引兵深入諸侯之地與敵人衝軍相當敵衆我寡敵强我弱敵人夜來或攻吾左或攻吾右三軍震動吾欲以戰則勝以守則固為之奈何太公曰如此者謂之震冦}
