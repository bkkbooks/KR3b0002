  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 六韜卷第五豹韜林戰武王問太公曰引兵深入諸侯之地遇大林與敵分林相拒吾欲以守則固以戰則勝爲之奈何太公曰使吾三軍分爲衝陳便兵所處弓弩爲表㦸楯爲裏斬除草木極廣吾道以便戰所髙置旌旗謹勑三軍無使敵人知吾之情是謂林戰林戰之法率吾矛㦸相與爲伍林間木踈以􅀐爲輔戰車居前見便則戰不見便則止林多險阻必置衝陳以備前後三軍疾戰敵人雖衆其將可走更戰更息各按其部是謂林戰之紀突戰武王問太公曰敵人深入長驅侵掠我地驅我牛馬其三軍大至薄我城下吾士卒大恐人民係累爲敵所虜吾欲以守則固以戰則勝爲之柰何太公曰如此者謂之突兵其牛馬必不得食士卒絶糧􅁀擊而前令我逺邑别軍選其銳士疾擊其後審其期曰必會於晦三軍疾戰敵人雖衆其將可虜武王曰敵人分爲三四或戰而侵掠我地或止而収我牛馬其大軍未盡至而使㓂薄我城下致吾三軍恐懼爲之奈何太公曰謹􅃸敵人未盡至則設備而待之去城四里而爲壘金鼔旌旗皆列而張别隊爲伏兵令我壘上多積強弩百歩一突門門有行馬車􅀐居外勇力銳士隱伏而處敵人若至使我輕卒合戰而佯走令我城上立旌旗擊鼙鼓完爲守備敵人以我爲守城必薄我城下發吾伏兵以衝其内或擊其外三軍疾戰或擊其前或擊其後勇者不得􅃲輕者不及走名曰突戰敵人雖衆其將必走武王曰善哉敵強武王問太公曰引兵深入諸侯之地與敵人衝軍相當敵衆我寡敵強我弱敵人夜來或攻吾左或攻吾右三軍震動吾欲以戰則勝以守則固爲之奈何太公曰如此者謂之震㓂}
