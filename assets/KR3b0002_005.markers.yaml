  - {type: variant, offset: 8, length: 0, content: '', krp: 未渡水後行未及舎發我伏兵疾擊其左右車騎擾亂其前後敵人雖衆其將可走事大國之君下鄰國之士厚其幣卑其辭如此則得大國之與鄰國之助矣武王曰善哉分險武王問太公曰引兵深入諸侯之地與敵人相遇於險阨之中吾左山而右水敵右山而左水與我分險相拒各欲以守則固以戰則勝爲之柰何太公曰處山之左急備山之右處山之右急備山之左險有大水無舟楫}
  - {type: variant, offset: 9, length: 2, content: 民利, SBCK: 以天潢濟吾三軍巳濟者亟廣吾道以便戰所以武衝爲前後列其強弩令行陳皆固衢道谷口以武衝絶之髙置旌旗是謂車城凡險戰之法以武衝爲前大櫓爲衛材士強弩翼吾左右三千人爲屯必置衝陳便兵所處左軍以左右軍以右中軍以中並攻而前巳戰者還歸屯所更戰更息必勝乃巳武王曰善哉六韜卷第五}
  - {type: variant, offset: 9, length: 2, content: 民利, WYG: 以天潢濟吾三軍已濟者亟廣吾道以便戰所以武衝為前後列其强弩令行陣皆固衢道谷口以武衝絶之髙置旌旗是謂軍城凡險戰之法以武衝為前大櫓為衛材士强弩翼吾左右三千人為一屯必置衝陣便兵所處左軍以左右軍以右中軍以中並攻而前已戰者還歸屯所更戰更息必勝乃已武王曰善哉六韜卷五}
