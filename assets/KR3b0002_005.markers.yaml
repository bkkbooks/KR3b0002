  - {type: variant, offset: 2, length: 0, content: '', SBCK: 逺遮我前急攻我後斷我銳兵絶我材士吾内外不得相聞三軍擾亂皆散而走士卒無􅃲志將吏無守心爲}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 逺遮我前急攻我後㫁我銳兵絶我材士吾内外不得相聞三軍擾亂皆敗而走士卒無鬬志將吏無守心為}
  - {type: variant, offset: 2, length: 0, content: '', krp: 逺遮我前急攻我後斷我銳兵絶我材士吾内外不得相聞三軍擾亂皆散而走士卒無鬪志將吏無守心爲}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 奈何太公曰明哉王之問也當明號審令岀我勇銳冒將之士人操炬火二人同鼔}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 奈何太公曰明哉王之問也當明號審令出我勇銳冒將之士人操炬火二人同鼓}
  - {type: variant, offset: 3, length: 0, content: '', krp: 奈何太公曰明哉王之問也當明號審令岀我勇銳冒將之士人操炬火二人同鼔}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 知敵人所在或擊其表或擊其裏微號相知令之滅火鼓音皆止中外相應期約皆當三軍疾戰敵必敗亡武王曰善哉敵武武王問太公曰引兵深入諸侯之地卒遇敵人甚衆且武武車驍􅀐繞我左右吾三軍皆震走不可止爲之奈何太公曰如此者謂之敗兵善者以勝不善者以亡武王曰用之奈何太公曰伏我材士強弩武車驍􅀐爲之左右常去前後三里敵人逐我發我車􅀐衝其左右如此則敵人擾亂吾走者自止武王曰敵人與我車􅀐相當敵衆我少敵強我弱其來整治精銳吾陳不敢當爲之奈何太公曰選我材士強弩伏於左右車􅀐堅陳而處敵人過我伏兵積弩射其左右車􅀐銳兵疾擊其軍或擊其前或擊其後敵人雖衆其將必走武王曰善哉鳥雲山兵武王問太公曰引兵深入諸侯之地遇髙山盤石其上亭亭無有草木四面受敵吾三軍恐懼士卒迷惑吾欲以守則固以戰則勝爲之奈何太公曰凡三軍處山之髙則爲敵所棲處山之下則爲敵所囚旣以被山而處必爲鳥雲之陳鳥雲之陳隂陽皆備或屯其隂或屯其陽處山之陽備山之隂處山之隂備山之陽處山之左備山之右處山之右備山之左其山敵所能陵者兵備其表衢道通谷絶以武車髙置旌旗謹勑三軍無使敵人知吾之情是謂山城}
