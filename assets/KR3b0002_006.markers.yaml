  front:
  - {type: variant, offset: 0, length: 2, content: 趨舍, SBCK: 六韜卷第六犬韜分兵武王問太公曰王者帥師三軍分爲數處將欲期㑹合戰約誓賞罰爲之柰何太公曰凡用兵之法三軍之衆必有分合之變其大將先定戰地戰日然後移檄書與諸將吏期攻城圍邑各㑹其所明告戰日漏刻有時大將設營而陳立表轅門清道而待諸將吏至者校其先後先期至者賞後期至者斬如此則逺近奔集三軍俱至并力合戰武鋒武王問太公曰凡用兵之要必有武車驍􅀐馳陳選鋒見可則擊之如何則可擊太公曰夫欲擊者當審察敵人十四變變見則擊之敵人必敗武王曰十四變可得聞乎太公曰敵人新集可擊人馬未食可擊天時}
