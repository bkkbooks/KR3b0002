  - {type: variant, offset: 12, length: 0, content: '', SBCK: 敵人必懼敵人暮欲歸舎三軍恐駭翼其兩旁疾擊其後薄其壘口無使得入敵人必敗敵人無險阻保固深入長驅絶其糧路敵人必飢地平而易四面見敵車􅀐䧟之敵人必亂敵人奔走士卒散亂或翼其兩旁或掩其前後其將可擒敵人暮返其兵甚衆其行陳必亂令我􅀐十而爲隊百而爲屯車五而爲聚十而爲羣多設旌旗雜以強弩或擊其兩旁或絶其前後敵將可虜此􅀐之十勝也武王曰九敗奈何太公曰凡以􅀐䧟敵而不能破陳敵人佯走以車􅀐返擊我後此􅀐之敗地也追北踰險長驅不止敵人伏我兩旁又絶我後此􅀐之圍地也往而無以返入而無以出是謂䧟於天井頓於地穴此􅀐之死地也所從入者隘所從出者逺彼弱可以擊我強彼寡可以擊我衆此􅀐之􅃿地也大澗深谷翳薉林木此􅀐之竭地也左右}
