  - {type: variant, offset: 0, length: 2, content: 趨舍, WYG: 欽定四庫全書六韜卷六犬韜分合第五十一武王問太公曰王者帥師三軍分為數處將欲期㑹合戰約誓賞罰為之奈何太公曰凡用兵之法三軍之衆必有分合之變其大將先定戰地戰日然後移檄書與諸將吏期攻城圍邑各會其所明告戰日漏刻有時大將設營而陣立表轅門清道而待諸將吏至者校其先後先期至者賞後期至者斬如此則逺近奔集三軍俱至并力合戰武鋒第五十二武王問太公曰凡用兵之要必有武車驍騎馳陣選鋒見可則擊之如何而可擊太公曰夫欲擊者當審察敵人十四變變見則擊之敵人必敗武王曰十四變可得聞乎太公曰敵人新集可擊人馬未食可擊天時}
