  - {type: variant, offset: 3, length: 0, content: '', SBCK: 順可擊地形未得可擊奔走可擊不戒可擊疲勞可擊將離士卒可擊渉長路可擊濟水可擊不暇可擊阻難狹路可擊亂行可擊心怖可擊練士武王問太公曰練士之道柰何太公曰軍中有大勇敢死樂傷者聚爲一卒名曰冐刃之士有銳氣壯勇彊􅁀者聚爲一卒名曰䧟陳之士有竒表長劒接武齊列者聚爲一卒名曰勇銳之士有㧞距伸鈎彊梁多力潰破金皷絶滅旌旗者聚爲一卒名曰勇力之士有踰髙絶逺輕足善走者聚爲一卒名曰冠兵之士有王臣失勢欲復見功者聚爲一卒名曰死闘之士有死將之人子弟欲與其將報仇者聚爲一卒名曰敢死之士有贅婿人虜欲掩迹揚名者聚爲一卒名曰勵鈍之士有貧窮憤怒欲快其心者聚爲一卒名曰必死之士有胥靡免罪之人欲逃其耻者聚爲一卒名曰倖用之士有材技兼人能􅀒重致逺者聚爲一卒名曰待命之士此軍之服習不可不察也敎戰武王問太公曰合三軍之衆欲令士卒練士敎戰之道奈何太公曰凡領三軍有金鼓之節所以整齊士衆者也將必先明告吏士申之以三令以敎操兵起居旌旗指麾之變法故教吏士使一人學戰敎成合之十人十人學戰教成合之百人百人學戰教成合之千人千人學戰敎成合之萬人萬人學戰教成合之三軍之衆大戰之法教成合之百萬之衆故能成其大兵立威於天下武王曰善哉均兵武王問太公曰以車與歩卒戰一車當㡬歩卒㡬歩卒當一車以􅀐與歩卒戰一􅀐當㡬歩卒㡬歩卒當一􅀐以車與􅀐戰一車當㡬􅀐㡬􅀐當一車太公曰車者軍之羽翼也所以䧟堅陳要彊敵遮走北也􅀐者軍之伺候也所以踵敗軍絶糧道擊便㓂也故車􅀐不敵戰則一􅀐不能當歩卒一人三軍之衆成陳而相當則易戰之法一車當歩卒八十人八十人當一車一􅀐當歩卒八人八人當一􅀐一車當十􅀐十􅀐當一車險戰之法一車當歩卒四十人四十人當一車一􅀐當歩卒四人四人當一􅀐一車當六􅀐六􅀐當一卒夫車􅀐者軍之武兵也十乗敗千人百乗敗萬人十􅀐敗百人百􅀐走千人此其大數也武王曰車􅀐之吏數陳法柰何太公曰置車之吏數五車一長十車一吏五十車一率百車一將易戰之法五車爲列相去四十歩左右十歩隊間六十歩險戰之法車必循道十車爲聚二十車爲屯前後相去二十歩左右六歩隊問三十六歩五車一長縱橫相去二里各返故道置􅀐之吏數五􅀐一長十􅀐一吏百􅀐一率二百􅀐一將易戰之法五􅀐爲列前後相去二十歩左右四歩隊間五十歩險戰者前後相去十歩左右二歩隊間二十五歩三十􅀐爲一屯六十􅀐爲一輩十􅀐一吏縱横相去百歩周環各復故處武王曰善哉武車士武王問太公曰選車士奈何太公曰選車士之法取年四十巳下長七尺五寸巳上走能逐奔馬及馳而乗之前後左右上下周旋能縛束旌旗力能彀八石弩射前後左右皆便習者名曰武車之士不可不厚也武􅀐士武王問太公曰選􅀐士奈何太公曰選􅀐士之法取年四十巳下長七尺五寸巳上壯徤捷疾超絶倫等能馳􅀐彀射前後左右周旋進退越溝塹登丘陵冒險阻絶大澤馳強敵亂大衆者名曰武􅀐之士不可不厚也戰車武王問太公曰戰車奈何太公曰歩貴知變動車貴知地形􅀐貴知別徑竒道三軍}
