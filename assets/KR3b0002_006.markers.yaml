  - {type: variant, offset: 4, length: 2, content: 喜怒, SBCK: 名而異用也凡車之死地有十其勝地有八武王曰十死之地奈何太公曰往而無以還者車之死地也越絶險阻乗敵逺行者車之竭地也前易後險者車之困地也䧟之險阻而難出者車之絶地也圯下漸澤黒土黏埴者車之勞地也左險右易上陵仰阪者車之逆地也殷草横􅅿犯歷深澤者車之拂地也車少地易與歩}
