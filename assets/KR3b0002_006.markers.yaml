  - {type: variant, offset: 9, length: 0, content: '', SBCK: 拙將之所以見擒明將之所以能避也武王曰八勝之地奈何太公曰敵之前後行陳未定即䧟之旌旗擾亂人馬數動即䧟之士卒或前或後或左或右即䧟之陳不堅固士卒前後相顧即䧟之前往而疑後恐而怯即䧟之三軍卒驚皆薄而起即䧟之戰於易地暮不能解即䧟之逺行而暮舎三軍恐懼即䧟之此八者車之勝地也將明於十害八勝敵雖圍周千乗萬􅀐前驅旁馳萬戰必勝武王曰善哉戰􅀐武王問太公曰戰􅀐奈何太公曰􅀐}
