  - {type: variant, offset: 14, length: 1, content: 失, SBCK: 王其修德以下賢惠民以觀天道天道無殃不可先倡人道無災不可先謀必見天殃又見人災乃可以謀必見其陽又見其隂乃知其心必見其外又見其内乃知其意必見其䟽又見其親乃知其情行其道道可致也從其門門可入也立其禮禮可成也爭其強強可勝也全勝不􅃲大兵無創與􅀑神通微哉微哉與人同病相救同情相成同惡相助同好相趨故無甲兵而勝無衝機而攻無溝壍而守大智不智大謀不謀大勇不勇大利不利利天下者天下啓之害天下者天下閉之天下者非一人之天下乃天下之天下也取天下者若逐野獸而天下皆有分􅁏之心若同舟而濟濟則皆同其利敗則皆同其害然則皆有啓之無有閉之也無取於民者取民者也無取於國者取國者也無取於天下者取天下者也無取民者民利之無取國者國利之無取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑飛歛翼猛獸將􅅮弭耳俯伏聖人將動必有愚色今彼殷商衆口相惑紛紛渺渺好色無極此亡國之徴也吾觀其野草菅勝穀吾觀其衆邪曲勝直吾觀其吏􅁀虐残賊敗法亂刑上下不覺此亡國之時也大明發而萬物皆照大義發而萬物皆利大兵發而萬物皆服大哉聖人之德獨聞獨見樂哉文啓文王問太公曰聖人何守太公曰何憂何嗇萬物皆得何嗇何憂萬物皆遒政之所施莫知其化時之所在莫知其移聖人守此而萬物化何窮之有終而復始優之游之展轉求之求而得之不可不藏旣以藏之不可不行旣以行之勿復明之夫天地不自明故能長生聖人不自明故能名彰古之聖人聚人而爲家聚家而爲國聚國而爲天下分封賢人以爲萬國命之曰大紀陳其政敎順其民俗羣曲化直變於形容萬國不通各樂}
