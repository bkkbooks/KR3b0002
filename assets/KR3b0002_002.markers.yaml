  - {type: variant, offset: 22, length: 1, content: 農, SBCK: 其君將復合之苟能嚴之國乃可謀六曰収其内閒其外才臣外相敵國内侵國鮮不亡七曰欲錮其心必厚賂之収其左右忠愛隂示以利令之輕業而蓄積空虚八曰賂以重寶因與之謀謀而利之利之必信是謂重親重親之積必爲我用有國而外其地大敗九曰尊之以名無難其身示以大勢從之必信致其大尊先爲之榮微飾聖人國乃大偷十曰下之必信以得其情承意應事如與同生旣以得之乃微収之時及將至􅀂天喪之十一曰塞之以道人臣無不重貴與富惡死與咎隂示大尊而微輸重寶収其豪傑内積甚厚而外爲乏隂納智士使圖其計納勇士使髙其氣富貴甚足而常有繁滋徒黨巳具是謂塞之有國而塞安能有國十二曰養其亂臣以迷之進羙女淫聲以惑之遺良犬馬以勞之時與大勢以誘之上察而與天下圖之十二節備乃成武事所謂上察天下察地徴巳見乃伐之順啓文王問太公曰何如而可爲天下太公曰大蓋天下然後能容天下信蓋天下然後能約天下仁蓋天下然後能懷天下恩蓋天下然後能保天下權蓋天下然後能不}
  - {type: page-break, offset: 22, content: '', id: KR3b0002_SBCK_002-4a}
  - {type: page-break, offset: 22, content: '', id: KR3b0002_SBCK_002-4b}
  - {type: variant, offset: 22, length: 1, content: 農, WYG: 其君將復合之茍能嚴之國乃可謀六曰收其内間其外才臣外相敵國内侵國鮮不亾七曰欲錮其心必厚賂之收其左右忠愛陰示以利令之輕業而蓄積空虚八曰賂以重寶因與之謀謀而利之利之必信是謂重親重親之積必為我用有國而外其地必敗九曰尊之以名無難其身示以大勢從之必信致其大尊先為之榮微飾聖人國乃大偷十曰下之必信以得其情承意應事如與同生既以得之乃微收之時及將至若天喪之十一曰塞之以道人臣無不重貴與富惡危與咎陰示大尊而微輸重寳收其豪傑内積甚厚而外為乏陰内智士使圖其計内勇士使髙其氣富貴甚足而常有繁滋徒黨已具是謂塞之有國而塞安能有國十二曰養其亂臣以迷之進美女淫聲以惑之遺良犬馬以勞之時與大勢以誘之上察而與天下圖之十二節備乃成武事所謂上察天下察地徵已見乃伐之順啟第十六文王問太公曰何如而可以為天下太公曰大葢天下然後能容天下信葢天下然後能約天下仁葢天下然後能懐天下恩葢天下然後能保天下權葢天下然後能不}
