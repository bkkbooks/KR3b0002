  - {type: variant, offset: 14, length: 1, content: 失, WYG: 王其修徳以下賢恵民以觀天道天道無殃不可先倡人道無災不可先謀必見天殃又見人災乃可以謀必見其陽又見其陰乃知其心必見其外又見其内乃知其意必見其疏又見其親乃知其情行其道道可致也從其門門可入也立其禮禮可成也爭其强强其勝也全勝不鬬大兵無創與鬼神通微哉微哉與人同病相救同情相成同惡相助同好相趨故無甲兵而勝無衝機而攻無溝塹而守大智不智大謀不謀大勇不勇大利不利利天下者天下啓之害天下者天下閉之天下者非一人之天下乃天下之天下也取天下者若逐野獸而天下皆有分肉之心若同舟而濟濟則皆同其利敗則皆同其害然則皆有以啓之無有以閉之也無取於民者取民者也無取民者民利之無取國者國利之無取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑飛斂翼猛獸將摶弭耳俯伏聖人將動必有愚色今彼有商衆口相惑紛紛渺𣺌好色無極此亡國之證也吾觀其野草菅勝榖吾觀其衆邪曲勝直吾觀其吏暴虐殘賊敗法亂刑上下不覺此亡國之時也大明𤼵而萬物皆照大義𤼵而萬物皆利大兵𤼵而萬物皆服大哉聖人之徳獨聞獨見樂哉文啓第十四文王問太公曰聖人何守太公曰何憂何嗇萬物皆得何嗇何憂萬物皆遒政之所施莫知其化時之所在莫知其移聖人守此而萬物化何窮之有終而復始優而游之展轉求之求而得之不可不藏既以藏之不可不行既以行之勿復明之夫天地不自明故能長生聖人不自明故能名彰古之聖人聚人而為家聚家而為國聚國而為天下分封賢人以為萬國命之曰大紀陳其政教順其民俗羣曲化直變于形容萬國不通各樂}
