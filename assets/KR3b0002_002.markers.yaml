  - {type: variant, offset: 47, length: 0, content: '', SBCK: 備然後可以爲天下政故利天下者天下啓之害天下者天下閉之生天下者天下德之殺天下者天下賊之徹天下者天下通之窮天下者天下仇之安天下者天下恃之危天下者天下災之天下者非一人之天下唯有道者處之三疑武王問太公曰予欲立功有三疑恐力不能攻強離親散衆爲之奈何太公曰因之慎謀用財夫攻強必養之使強益之使張太強必折太張必缺攻強以強離親以親散衆以衆凡謀之道周密爲寶設之以事玩之以利爭心必起欲離}
