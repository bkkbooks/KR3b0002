  - {type: variant, offset: 18, length: 0, content: '', SBCK: 靜之賢人務正之愚人不能正故與人爭上勞則刑繁刑繁則民憂民憂則流亡上下不安其生累丗不休命之曰大失天下之人如流水障之則止啓之則行靜之則清嗚呼神哉聖人見其所始則知其所終文王曰靜之奈何太公曰天有常形民有常生與天下共其生而天下靜矣太上因之其次化之夫民化而從政}
