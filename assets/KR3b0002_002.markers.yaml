  - {type: variant, offset: 19, length: 1, content: 胃, SBCK: 以天無爲而成事民無與而自富此聖人之德也文王曰公言乃恊子懷夙夜念之不忘以用爲常文伐文王問太公曰文伐之法奈何太公曰凡文伐有十二節一曰因其所喜以順其志彼將生驕必有好事苟能因之必能去之二曰親其所愛以分其威一人兩心其中必衰廷無忠臣社稷必危三曰隂賂左右得情甚深身内情外國將生}
