  - {type: variant, offset: 26, length: 0, content: '', SBCK: 爲之奈何太公曰主與將有隂符凡八等有大勝克敵之符長一尺破軍擒將之符長九寸降城得邑之符長八寸却敵報逺之符長七寸警衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使行符稽留若符事聞泄告者皆誅之八符者主將祕聞所}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 為之奈何太公曰主與將有陰符凡八等有大勝克敵之符長一尺破軍殺將之符長九寸降城得邑之符長八寸郤敵報逺之符長七寸誓衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使行符稽留者若符事泄聞者告者皆誅之八符者主將秘聞所}
  - {type: variant, offset: 26, length: 0, content: '', krp: 爲之奈何太公曰主與將有隂符凡八等有大勝克敵之符長一尺破軍擒將之符長九寸降城得邑之符長八寸却敵報逺之符長七寸警衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使行符稽留若符事聞泄告者皆誅之八符者主將祕聞所}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 隂通言語不泄中外相知之術敵雖聖智莫之能識武王曰}
