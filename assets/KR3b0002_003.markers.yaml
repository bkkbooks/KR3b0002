  - {type: variant, offset: 24, length: 0, content: '', SBCK: 則止勿以三軍爲衆而輕敵勿以受命爲重而必死勿以身貴而賤人勿以獨見而違衆勿以辯􅀃爲必然士未坐勿坐士未食勿食寒暑必同如此則士衆必盡死力將巳受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣旣受命專斧􅃏之威臣不敢生還願君亦垂一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不聞君命皆由將出臨敵决戰無有二心若此則無天於上無地於下無敵於前無君於後是故智者爲之謀勇者爲之􅃲氣厲青雲疾若馳騖兵不接刃而敵降服戰勝於外功立於内吏遷士賞百姓懽􅀃將無咎殃是故風雨時節五穀豐熟社稷安寧武王曰善哉將威武王問太公曰將何以爲威何以爲明何以爲禁止而令行太公曰將以誅大爲威以賞小爲明以罰審爲禁止而令行故殺一人而三軍震者殺之賞一人而萬人􅀃者賞之殺貴大賞貴小殺及當路貴重之臣是刑上極也賞及牛竪馬洗廐養之徒是賞下通也刑上極賞下通是將威之所行也勵軍武王問太公曰吾欲令三軍之衆攻城爭先登野戰爭先赴聞金聲而怒聞鼓聲而喜爲之奈何太公曰將有三武王曰敢問其目太公曰將冬不服裘夏不操扇雨不張蓋名曰禮將將不身服禮無以知士卒之寒暑出隘塞犯泥塗將必先下歩名曰力將將不身服力無以知士卒之勞苦軍皆定次將乃就舎炊者皆熟將乃就食軍不舉火將亦不舉名曰上欲將將不身服止欲無以知士卒之飢飽將與士卒共寒暑勞苦飢飽故三軍之衆聞鼓聲則喜聞金聲則怒髙城􅀷池矢石繁下士爭先登白刃始合士爭先赴士非}
