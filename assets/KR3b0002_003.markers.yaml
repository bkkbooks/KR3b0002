  - {type: variant, offset: 25, length: 0, content: '', SBCK: 死而樂傷也爲其將知寒暑飢飽之審而見勞苦之明也隂符武王問太公曰引兵􅀷入諸侯之地三軍卒有緩急或利或害吾將以近通逺從中􅀿外以給三軍之}
  - {type: page-break, offset: 25, content: '', id: KR3b0002_SBCK_003-6a}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 死而樂傷也為其將知寒暑饑飽之審而見勞苦之明也陰符第二十四武王問太公曰引兵深入諸侯之地三軍卒有緩急或利或害吾將以近通逺從中應外以給三軍之}
