  - {type: variant, offset: 23, length: 0, content: '', SBCK: 道奈何太公曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍今某國不臣願將軍帥師應之將旣受命乃命太史􅁲齋三日之太廟鑚靈􅀛􅁲吉日以授斧􅃏君入廟門西面而立將入廟門北面而立君親操􅃏持首授將其柄曰從此上至天者將軍制之復操斧持柄授將其刃曰從此下至淵者將軍制之見其虚則進見其}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 道奈何太公曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍今某國不臣願將軍帥師應之也將既受命乃命太史卜齋三日之太廟鑽靈龜卜吉日以受斧鉞君入廟門西面而立將入廟門北面而立君親操鉞持首授將其柄曰從此上至天者將軍制之復操斧持柄授將其刃曰從此下至淵者將軍制之見其虚則進見其}
