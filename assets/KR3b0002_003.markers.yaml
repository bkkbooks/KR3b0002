  - {type: variant, offset: 13, length: 3, content: 國危亡, WYG: 不肖}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 帥師必有股肱羽翼以成威神爲之柰}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 有温良而為盜者有貌恭敬而心慢者有外謙謹而内無恭敬者有精精而無情者有湛湛而無誠者有好謀而決者有如果敢而不能者有悾悾而不信者有恍恍惚惚而反忠實者有詭激而有功効者有外勇而内怯者有肅肅而反易人者有嗃嗃而反靜慤者有勢虚形劣而出外無所不至無使不遂者天下所賤聖人所貴凡人不知非有大明不見其際此士之外貌不與中情相應者也武王曰}
