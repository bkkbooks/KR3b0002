  - {type: variant, offset: 34, length: 1, content: 忠, WYG: 易五行之神道之常也金木水火土各以其勝攻也古者三皇之世虚無之情以制剛强無有文字皆由五行五行之道天地自然六甲之分微妙之神其法以天清淨無陰雲風雨夜半遣輕騎往至敵人之壘去九百步外徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徵聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徵成敗之機武王曰善哉太公曰微妙之音皆有外候武王曰何以知之太公曰敵人驚動則聽之聞枹鼓之音者角也見火光者徵也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五音者聲色之符也兵徵第二十九武王問太公曰吾欲未戰先知敵人之强弱豫見勝負之徵}
  - {type: page-break, offset: 34, content: '', id: KR3b0002_WYG_003-13a, image: WYG0726/WYG0726-0026c.png}
