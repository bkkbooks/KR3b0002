  - {type: variant, offset: 38, length: 1, content: 非, SBCK: 知敵金木水火土各以其勝攻之古者三皇之世虚無之情以制剛彊無有文字皆由五行五行之道天地自然六甲之分微妙之神其法以天清浄無隂雲風雨夜半遣輕騎徃至敵人之壘去九百歩外偏持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徵聲應管當以􅀇武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徵成敗之機武王曰善哉太公曰微妙之音皆有外候武王曰何以知之太公曰敵人驚動則聽之聞枹鼓之音者角也見火光者徵也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五者聲色之符也兵徴武王問太公曰吾欲未戰先知敵人之強弱豫見勝􅀒之徴爲之奈何太公曰勝􅀒之徴精神先見明將察之其敗在人謹候敵人出入進退察其動靜言語祅祥士卒所告凡三軍􅀃懌士卒畏法敬其將命相喜以破敵相陳以勇猛相賢以威武此強徴也三軍數驚士卒不齊相恐以敵強相語以不利耳目相屬祅言不止衆口相惑不畏法令不重其將此弱徴也三軍齊整陳勢巳固􅀷溝髙壘又有大風甚雨之利三軍無故旌旗前指金鐸之聲揚以清鼙鼓之聲宛以鳴此得神明之助大勝之徴也行陳不固旌旗亂而相繞逆大風甚雨之利士卒恐懼氣絶而不屬戎馬驚奔兵車折軸金鐸之聲下以濁鼙鼓之聲濕如沐此大敗之徴也凡攻城圍邑城之氣色如死􅁅城可屠城之氣出而北城可克城之氣出而西城必降城之氣出而南城不可拔城之氣出而東城不可攻城之氣出而復入城主逃北城之氣出而覆我軍之上軍必病城之氣岀髙而無所止用曰長乆凡攻城圍邑過旬不雷不􅀨必亟去之城必有大輔此所以知可攻而攻不可攻而止武王曰善哉農器武王問太公曰天下安定國家無事戰攻之具可無修乎守禦之備可無設乎太公曰戰攻守禦之具盡在於人事耒耜者其行馬蒺藜也馬牛車輿者其營壘蔽櫓也鋤耰之具其矛㦸也蓑薛簦笠者其甲胄干楯也钁鍤斧鋸杵臼其攻城器也牛馬所以轉輸糧用也雞犬其伺候也婦人織紝其旌旗也丈夫平壤其攻城也春鏺草􅁄其戰車􅀐也夏耨田疇具戰歩兵也秋刈禾薪其糧食儲備也冬實倉廩其堅守也田里相伍其約束符}
