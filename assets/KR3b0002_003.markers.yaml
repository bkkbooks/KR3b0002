  - {type: variant, offset: 10, length: 0, content: '', WYG: 王者帥師必有股肱羽翼以成威神為之奈何太公曰凡}
  - {type: variant, offset: 10, length: 6, content: 舉賢而國危亡, krp: 王}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 兵師以將為命命在通達不守一術因能授職各取所長隨時變化以為紀綱故將有股肱羽翼七十二人以應天道備數如法審知命理殊能異技萬事畢矣武王曰請問其目太公曰腹心一人主贊謀應卒揆天消變總覽計謀保全民命謀士五人主圖安危慮未萌論行能明賞罰授官位決嫌疑定可否天文三人主司星厯侯風氣推時日考符騐校災異知天心去就之機地利三人主軍行止形勢利害消息逺近險易水涸山阻不失地利兵法九人主講論異同行事成敗簡練兵器刺舉非法通糧四人主度飲食備蓄積通糧道致五榖令三軍不困乏奮威四人主擇才力論兵革風馳電掣不知所由伏旗鼔三人主伏旗鼓明耳目詭符印謬號令闇忽往來出入若神股肱四人主任重持難修溝塹治壁壘以備守禦通才二人主拾遺補過應對賓客論議談語消患解結權士三人主行奇譎設殊異非人所識行無窮之變耳目七人主往來聽言觀變覽四方之事軍中之情爪牙五人主揚威武激勵三軍使冒難攻銳無所疑慮羽翼四人主揚名譽震逺方動四境以弱敵心遊士八人主伺姦候變開閤人情觀敵之意以為間諜術士二人主為譎詐依托鬼神以惑衆心方士三人主百藥以治金瘡以痊萬病法筭二人主㑹計三軍營壘糧食財用出入論將第十九武王問太公曰論將之道奈何太公曰將有五材十過武王曰敢問其目太公曰所謂五材者勇智仁信忠也勇則不可犯智則不可亂仁則愛人信則不欺忠則無二心所謂十過者有勇而輕死者有急而心速者有貪而好利者有仁而不忍人者有智而心怯者有信而喜信人者有㢘潔而不愛人者有智而心緩者有剛毅而自用者有懦而喜任人者勇而輕死者可暴也急而心速者可久也貪而好利者可貴也仁而不忍人者可勞也智而心怯者可窘也信而喜信人者可誑也廉潔而不愛人者可侮也智而心緩者可襲也剛毅而自用者可事也懦而喜任人者可欺也故兵者國之大事存亡之道命在于將將者國之輔先王之所重也故置將不可不察也故曰將不兩勝亦不兩敗兵出踰境不出十日不有亡國必有破軍殺將武王曰善哉選將第二十武王問太公曰王者舉兵簡練英雄知士之髙下為之奈何太公曰夫士外貌不與衆情相應者十五有}
