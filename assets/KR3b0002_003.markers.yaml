  - {type: variant, offset: 36, length: 1, content: 忠, WYG: 之奈何太公曰勝負之徵精神先見明將察之其效在人謹候敵人出入進退察其動靜言語妖祥士卒所告凡三軍悅懌士卒畏法敬其將命相喜}
