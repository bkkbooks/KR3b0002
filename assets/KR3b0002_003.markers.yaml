  - {type: variant, offset: 21, length: 0, content: '', SBCK: 曰凡舉兵帥師以將爲命命在通逹不守一術因能受職各取所長隨時變化以爲綱紀故將有股肱羽翼七十二人以應天道備數如法審知命理殊能異技萬事畢矣武王曰請問其目太公曰腹心一人主潜謀應卒揆夫消變揔攬計謀保全民命謀士五人主啚安危慮未萌論行能明賞罰授官位决嫌疑定可否天文三人主司星曆候風氣推時曰考符驗校灾異知人心去就之機地利三人主三軍行止形􅀔利害消息逺近險易水涸山阻不失地利兵法九人主講論異同行事成敗簡練兵器刺舉非法通糧四人主度飲食蓄積通糧道􅆀五􅂖令三軍不困乏奮威四人主擇材力論兵革風馳電擊不知所由伏鼓旗三人主伏鼓旗明耳目詭符節􅍝號令闇忽徃來出入若神股肱四人主任重持難修溝壍治壁壘以備守禦通材三人主拾遺補過應偶賔客論議談語消患觧結權士三人主行竒譎設殊異非人所識行無窮之變耳目七人主往來聽言視變覽四方之事軍中之情􅀲牙五人主揚威武激勵三軍使冒難攻銳無所疑慮羽翼四人主揚名譽震逺方揺動四境以弱敵心遊士八人主伺姦􅃸變開闔人情觀敵之意以爲間諜術士二人主爲譎詐依託􅀑神以惑衆心方士二人主百藥以治金瘡以痊萬病法筭二人主計㑹三軍營壁糧食財用出入論將武王問太公曰論將之道奈何太公曰將有五材十過武王曰敢問其目太公曰所謂五材者勇智仁信忠也勇則不可犯智則不可亂仁則愛人信則不欺忠則無二心所謂十過者有勇而輕死者有急而心速者有貪而好利者有仁而不忍人者有智而心怯者有信而喜信人者有廉㓗而不愛人者有智而心緩者有剛毅而自用者有懦而喜任人者勇而輕死者可暴也急而心速者可乆也貪而好利者可遺也仁而不忍人者可勞也智而心怯者可窘也信而喜信人者可誑也廉㓗而不愛人者可侮也智而心緩者可襲也剛毅而自用者可事也懦而喜任人者可欺也故兵者國之大事存亡之道命在於將將者國之輔先王之所重也故置將不可不察也故曰兵不兩勝亦不兩敗兵出踰境期不十日不有亡國必有破軍殺將武王曰善哉選將武王問太公曰王者舉兵欲簡練英雄知士之髙下爲之奈何太公曰夫士外貌不與中情相應者十五有嚴而不肖者有溫良而爲盗者有貌恭敬而心慢者有外廉謹而内無至誠者有精精而無情者有湛湛而無誠者有好謀而不决者有如果敢而不能者有悾悾而不信者有怳怳惚惚而反忠實者有詭激而有功効者有外勇而内怯者有肅肅而反易人者有嗃嗃而反靜慤者有勢虚形劣而外岀無所不至無所不遂者天下所賤聖人所貴凡人莫知非有大明不見其際此士之外貌不與中情相應者也武王曰何以知之太公曰知之有八徴一曰問之以言以觀其辭二曰窮之以辭以觀其變三曰與之閒謀以觀其誠四曰明白顯問以觀其德五曰使之以財以觀其廉六曰試之以色以觀其貞七曰告之以難以觀其勇八曰醉之以酒以觀其態八徴皆備則}
