  - {type: variant, offset: 31, length: 0, content: '', WYG: 曰未見形而戰雖衆必敗善戰者居之不撓見勝則起不勝則止故曰無恐懼無猶豫用兵之害猶豫為大三軍之災莫過狐疑善戰者見利不失遇時不疑失利後時反受其殃故智者從之而不失巧者一決而不猶豫是以疾雷不及掩耳迅電不及瞑目赴之若驚用之若狂當之者破近之者亾孰能禦之夫將有所不言而守者神也有所不見而視者明也故知神明之道者野無横敵對無立國武王曰善哉奇兵第二十七武王問太公曰凡用兵之法大要何如太公曰古之善戰者非能戰於天上非能戰于地下其成與敗皆由神勢得之者昌失之者亾夫兩陣之間出甲陳兵縱卒亂行者所以為變也深草蓊蘙者所以遁逃也谿谷險阻者所以止車禦騎也隘塞山林者所以少擊衆也坳澤窈㝠者所以匿其形也清明無隠者所以戰勇力也疾如流矢擊如𤼵機者所以破精微也詭伏設奇逺張誑誘者所以破軍擒將也四分五裂者所以擊圓破方也因其驚駭者所以一擊十也因其勞倦暮舎者所以十擊百也奇技者所以越深水渡江河也强弩長兵者所以踰水戰也長闗逺堠暴疾謬遁者所以降城服邑也鼓行讙囂者所以行奇謀也大風甚雨者所以摶前擒後也偽稱敵使者所以絶糧道也謬號令與敵同服者所以備走北也戰必以義者所以勵衆勝敵也尊爵重賞者所以勸用命也嚴刑重罰者所以進罷怠也一喜一怒一予一奪一文一武一徐一疾者所以調和三軍制一臣下也處髙敞者所以警守也保險阻者所以為固也山林茂穢者所以黙往來也深溝髙壘積糧多者所以持久也故曰不知戰攻之䇿不可以語敵不能分移不可以語奇不通治亂不可以語變故曰將不仁則三軍不親將不勇則三軍不銳將不智則三軍大疑將不明則三軍大傾將不精微則三軍失其機將不常戒則三軍失其備將不强力則三軍失其職故將者人之司命三軍與之俱治與之俱亂得賢將者兵强國昌}
