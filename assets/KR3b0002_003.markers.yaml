  - {type: variant, offset: 24, length: 0, content: '', WYG: 則止勿以三軍為衆而輕敵勿以受命為重而必死勿以身貴而賤人勿以獨見而違衆勿以辯說為必然也士未坐勿坐士未食勿食寒暑必同如此士衆必盡死力將已受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣既受命専斧鉞之威臣不敢生還願君亦垂一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不聞君命皆由將出臨敵決戰無有二心若此則無天於上無地於下無敵於前無君於後是故智者為之謀勇者為之鬭氣厲青雲疾若馳鶩兵不接刃而敵降服戰勝於外功立於内吏遷上賞百姓歡悅將無咎殃是故風雨時節五榖豐登社稷安寧武王曰善哉將威第二十二武王問太公曰將何以為威何以為明何以為禁止而令行太公曰將以誅大為威以賞小為明以罰審為禁止而令行故殺一人而三軍震者殺之賞一人而萬人說者賞之殺貴大賞貴小殺其當路貴重之人是刑上極也賞及牛竪馬洗廐養之徒是賞下通也刑上極賞下通是將威之所行也厲軍第二十三武王問太公曰吾欲三軍之衆攻城爭先登野戰爭先赴聞金聲而怒聞鼓聲而喜為之奈何太公曰將有三勝武王曰敢問其目太公曰將冬不服裘夏不操扇雨不張葢名曰禮將將不身服禮無以知士卒之寒暑出隘塞犯泥塗將必先下步名曰力將將不身服力無以知士卒之勞苦軍皆定次將乃就舎炊者皆熟將乃就食軍不舉火將亦不舉名曰止欲將將不身服止欲無以知士卒之饑飽將與士卒共寒暑勞苦饑飽故三軍之衆聞鼓聲則喜聞金聲則怒髙城深池矢石繁下士爭先登白刃始合士爭先赴士非}
