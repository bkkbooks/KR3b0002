  - {type: variant, offset: 28, length: 0, content: '', SBCK: 哉隂書武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事煩多符不能明相去遼逺言語不通爲之奈何太公曰諸有隂事大慮當用書不用符主以書遺將將以書問主書皆一合}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 哉陰書第二十五武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事繁多符不能明相去遼逺言語不通為之奈何太公曰諸有陰事大慮當用書不用符主以書遺將將以書問主書皆一合}
  - {type: variant, offset: 28, length: 0, content: '', krp: 哉隂書武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事煩多符不能明相去遼逺言語不通爲之奈何太公曰諸有隂事大慮當用書不用符主以書遺將將以書問主書皆一合}
  - {type: variant, offset: 29, length: 0, content: '', SBCK: 再離三發而一知再離者分書爲三部三發而一知者言三人人操一分相參而不相知情也此謂隂書敵雖聖智莫之能識武王曰善哉軍勢武王問太公曰攻伐之道奈何太公曰資因敵家之動變生於兩陳之間竒正發於無窮之源故至事不語用兵不言且事之至者其言不足聽也兵之用者其狀不足見也倐而往忽而來能獨專而不制者兵也夫兵聞則議見則圖知則困辨則危故善戰者不待張軍善除患者理於未生善勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良將也設備於巳失之後者非上聖也智與衆同非國師也技與衆同非國工也事莫大於必克用莫大於􅀇黙動莫神於不意謀莫善於不識夫先勝者先見弱於敵而後戰者也故事半而功倍焉聖人徴於天地之動孰知其紀循隂陽之道而從其候當天地盈縮因}
  - {type: page-break, offset: 29, content: '', id: KR3b0002_SBCK_003-7a}
  - {type: page-break, offset: 29, content: '', id: KR3b0002_SBCK_003-7b}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 再離三𤼵而一知再離者分書為三部三𤼵而一知者言三人人操一分相叅而不使知情也此謂陰書敵雖聖智莫之能識武王曰善哉軍勢第二十六武王問太公曰攻伐之道奈何太公曰勢因於敵家之動變生于兩陣之間奇正𤼵于無窮之源故至事不語用兵不言且事之至者其言不足聽也兵之用者其狀不定見也倐而往倐而來能獨専而不制者兵也聞則議見則圖知則困辨則危故善戰者不待張軍善除患者理于未生勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良將也設備於己失之後者非上聖也智與衆同非國師也技與衆同非國工也事莫大于必克用莫大於𤣥黙動莫大於不意謀莫大於不識夫先勝者先見弱於敵而後戰者也故士半而功倍焉聖人徵于天地之動孰知其紀循陰陽之道而從其候當天地盈縮因}
  - {type: page-break, offset: 29, content: '', id: KR3b0002_WYG_003-9a, image: WYG0726/WYG0726-0024c.png}
  - {type: page-break, offset: 29, content: '', id: KR3b0002_WYG_003-9b, image: WYG0726/WYG0726-0024d.png}
  - {type: variant, offset: 29, length: 0, content: '', krp: 再離三發而一知再離者分書爲三部三發而一知者言三人人操一分相參而不相知情也此謂隂書敵雖聖智莫之能識武王曰善哉軍勢武王問太公曰攻伐之道奈何太公曰資因敵家之動變生於兩陳之間竒正發於無窮之源故至事不語用兵不言且事之至者其言不足聽也兵之用者其狀不足見也倐而往忽而來能獨專而不制者兵也夫兵聞則議見則圖知則困辨則危故善戰者不待張軍善除患者理於未生善勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良將也設備於巳失之後者非上聖也智與衆同非國師也技與衆同非國工也事莫大於必克用莫大於玄黙動莫神於不意謀莫善於不識夫先勝者先見弱於敵而後戰者也故事半而功倍焉聖人徴於天地之動孰知其紀循隂陽之道而從其候當天地盈縮因}
  - {type: variant, offset: 30, length: 0, content: '', SBCK: 爲常物有死生因天地之形}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 為常物有死生因天地之形}
  - {type: variant, offset: 30, length: 0, content: '', krp: 爲常物有死生因天地之形}
  - {type: variant, offset: 31, length: 0, content: '', SBCK: 曰未見形而戰雖衆必敗善戰者居之不撓見勝則起不勝則止故曰無恐懼無猶豫用兵之害猶豫最大三軍之災莫過狐疑善者見利不失遇時不疑失利後時反受其殃故智者從之而不釋巧者一决而不猶豫是以疾雷不及掩耳迅電不及瞑目赴之若驚用之若狂當之者破近之者亡孰能禦之夫將有所不言而守者神也有所不見而視者明也故知神明之道者野無衡敵對無立􅀦武王曰善㢤竒兵武王問太公曰凡用兵之道大要何如太公曰古之善戰者非能戰於天上非能戰於地下其成與敗皆由神勢得之者昌失之者亡夫兩陳之間岀甲陳兵縱卒亂行者所以爲變也深草蓊蘙者所以逃遁也谿谷險阻者所以止車禦􅀐也隘塞山林者所以少擊衆也􅉾澤窈㝠者所以匿其形也清明無隱者所以戰勇力也疾如流矢如發機者所以破精微也詭伏設竒逺張誑誘者所以破軍擒將也四分五裂者所以擊圎破方也困其驚驤者所以一擊十也因其勞倦暮舎者所以十擊百也竒伎者所以越深水渡江河也彊弩長兵者所以踰水戰也長􅀜逺候暴疾􅍝遁者所以降城服邑也鼓行喧囂者所以行竒謀也大風甚雨者所以搏前擒後也僞稱敵使者所以絶糧道也􅍝號令與敵同服者所以備走北也戰必以義者所以勵衆勝敵也尊爵重賞者所以勸用命也嚴刑罰者所以進罷怠也一喜一怒一與一奪一文一武一徐一疾者所以調和三軍制一臣下也䖏髙敞者所以警守也保阻險者所以爲固也山林茂􅁾者所以黙徃来也深溝髙壘粮多者􅀁以持乆也故曰不知戰攻之䇿不可以語敵不能分移不可以語竒不通治亂不可以語變故曰將不仁則三軍不親將不勇則三軍不銳將不智則三軍大疑將不明則三軍大傾將不精微則三軍失其機將不常戒則三軍失其備將不彊力則三軍失其職故將者人之司命三軍與之俱治與之俱亂得賢將者兵彊􅀦昌}
