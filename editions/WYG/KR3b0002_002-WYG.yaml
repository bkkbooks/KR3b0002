body:
  text: 六韜卷二武韜𤼵啓第十三文王在酆召太公曰嗚呼商王虐極罪殺不辜公尚助予憂民如何太公曰王其修徳以下賢恵民以觀天道天道無殃不可先倡人道無災不可先謀必見天殃又見人災乃可以謀必見其陽又見其陰乃知其心必見其外又見其内乃知其意必見其疏又見其親乃知其情行其道道可致也從其門門可入也立其禮禮可成也爭其强强其勝也全勝不鬬大兵無創與鬼神通微哉微哉與人同病相救同情相成同惡相助同好相趨故無甲兵而勝無衝機而攻無溝塹而守大智不智大謀不謀大勇不勇大利不利利天下者天下啓之害天下者天下閉之天下者非一人之天下乃天下之天下也取天下者若逐野獸而天下皆有分肉之心若同舟而濟濟則皆同其利敗則皆同其害然則皆有以啓之無有以閉之也無取於民者取民者也無取民者民利之無取國者國利之無取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑飛斂翼猛獸將摶弭耳俯伏聖人將動必有愚色今彼有商衆口相惑紛紛渺𣺌好色無極此亡國之證也吾觀其野草菅勝榖吾觀其衆邪曲勝直吾觀其吏暴虐殘賊敗法亂刑上下不覺此亡國之時也大明𤼵而萬物皆照大義𤼵而萬物皆利大兵𤼵而萬物皆服大哉聖人之徳獨聞獨見樂哉文啓第十四文王問太公曰聖人何守太公曰何憂何嗇萬物皆得何嗇何憂萬物皆遒政之所施莫知其化時之所在莫知其移聖人守此而萬物化何窮之有終而復始優而游之展轉求之求而得之不可不藏既以藏之不可不行既以行之勿復明之夫天地不自明故能長生聖人不自明故能名彰古之聖人聚人而為家聚家而為國聚國而為天下分封賢人以為萬國命之曰大紀陳其政教順其民俗羣曲化直變于形容萬國不通各樂其所人愛其上命之曰大定嗚呼聖人務靜之賢人務正之愚人不能正故與人爭上勞則刑繁刑繁則民憂民憂則流亡上下不安其生累世不休命之曰大失天下之人如流水障之則止啟之則行靜之則清嗚呼神哉聖人見其始則知其終文王曰靜之奈何太公曰天有常形民有常生與天下共其生而天下靜矣太上因之其次化之夫民化而從政是以天無為而成事民無與而自富此聖人之徳也文王曰公言乃協予懐夙夜念之不忘以用為常文伐第十五文王問太公曰文伐之法奈何太公曰凡文伐有十二節一曰因其所喜以順其志彼將生驕必有奸事茍能因之必能去之二曰親其所愛以分其威一人兩心其中必衰廷無忠臣社稷必危三曰陰賂左右得情甚深身内情外國將生害四曰輔其淫樂以廣其志厚賂珠玉娛以美人卑辭委聽順命而合彼將不爭奸節乃定五曰嚴其忠臣而薄其賂稽留其使勿聽其事亟為置代遺以誠事親而信之其君將復合之茍能嚴之國乃可謀六曰收其内間其外才臣外相敵國内侵國鮮不亾七曰欲錮其心必厚賂之收其左右忠愛陰示以利令之輕業而蓄積空虚八曰賂以重寶因與之謀謀而利之利之必信是謂重親重親之積必為我用有國而外其地必敗九曰尊之以名無難其身示以大勢從之必信致其大尊先為之榮微飾聖人國乃大偷十曰下之必信以得其情承意應事如與同生既以得之乃微收之時及將至若天喪之十一曰塞之以道人臣無不重貴與富惡危與咎陰示大尊而微輸重寳收其豪傑内積甚厚而外為乏陰内智士使圖其計内勇士使髙其氣富貴甚足而常有繁滋徒黨已具是謂塞之有國而塞安能有國十二曰養其亂臣以迷之進美女淫聲以惑之遺良犬馬以勞之時與大勢以誘之上察而與天下圖之十二節備乃成武事所謂上察天下察地徵已見乃伐之順啟第十六文王問太公曰何如而可以為天下太公曰大葢天下然後能容天下信葢天下然後能約天下仁葢天下然後能懐天下恩葢天下然後能保天下權葢天下然後能不失天下事而不疑則天運不能移時變不能遷此六者備然後可以為天下政故利天下者天下啓之害天下者天下閉之生天下者天下徳之殺天下者天下賊之徹天下者天下通之窮天下者天下仇之安天下者天下恃之危天下者天下災之天下者非一人之天下惟有道者處之三疑第十七武王問太公曰予欲立功有三疑恐力不能攻强離親散衆為之奈何太公曰因之慎謀用財夫攻强必養之使强益之使張太强必折太張必缺攻强以强離親以親散衆以衆凡謀之道周宻為寶設之以事玩之以利爭心必起欲離其親因其所愛與其寵人與之所欲示之所利因以疏之無使得志彼貪利甚喜遺疑乃止凡攻之道必先塞其明而後攻其强毁其大除民之害淫之以色啗之以利養之以味娯之以樂既離其親必使逺民勿使知謀扶而納之莫覺其意然後可成恵施于民必無愛財民如牛馬數餧食之從而愛之心以啟智智以啟財財以啟衆衆以啓賢賢之有啓以王天下六韜卷二
