body:
  text: 六韜卷三龍韜王翼第十八武王問太公曰王者帥師必有股肱羽翼以成威神為之奈何太公曰凡舉兵師以將為命命在通達不守一術因能授職各取所長隨時變化以為紀綱故將有股肱羽翼七十二人以應天道備數如法審知命理殊能異技萬事畢矣武王曰請問其目太公曰腹心一人主贊謀應卒揆天消變總覽計謀保全民命謀士五人主圖安危慮未萌論行能明賞罰授官位決嫌疑定可否天文三人主司星厯侯風氣推時日考符騐校災異知天心去就之機地利三人主軍行止形勢利害消息逺近險易水涸山阻不失地利兵法九人主講論異同行事成敗簡練兵器刺舉非法通糧四人主度飲食備蓄積通糧道致五榖令三軍不困乏奮威四人主擇才力論兵革風馳電掣不知所由伏旗鼔三人主伏旗鼓明耳目詭符印謬號令闇忽往來出入若神股肱四人主任重持難修溝塹治壁壘以備守禦通才二人主拾遺補過應對賓客論議談語消患解結權士三人主行奇譎設殊異非人所識行無窮之變耳目七人主往來聽言觀變覽四方之事軍中之情爪牙五人主揚威武激勵三軍使冒難攻銳無所疑慮羽翼四人主揚名譽震逺方動四境以弱敵心遊士八人主伺姦候變開閤人情觀敵之意以為間諜術士二人主為譎詐依托鬼神以惑衆心方士三人主百藥以治金瘡以痊萬病法筭二人主㑹計三軍營壘糧食財用出入論將第十九武王問太公曰論將之道奈何太公曰將有五材十過武王曰敢問其目太公曰所謂五材者勇智仁信忠也勇則不可犯智則不可亂仁則愛人信則不欺忠則無二心所謂十過者有勇而輕死者有急而心速者有貪而好利者有仁而不忍人者有智而心怯者有信而喜信人者有㢘潔而不愛人者有智而心緩者有剛毅而自用者有懦而喜任人者勇而輕死者可暴也急而心速者可久也貪而好利者可貴也仁而不忍人者可勞也智而心怯者可窘也信而喜信人者可誑也廉潔而不愛人者可侮也智而心緩者可襲也剛毅而自用者可事也懦而喜任人者可欺也故兵者國之大事存亡之道命在于將將者國之輔先王之所重也故置將不可不察也故曰將不兩勝亦不兩敗兵出踰境不出十日不有亡國必有破軍殺將武王曰善哉選將第二十武王問太公曰王者舉兵簡練英雄知士之髙下為之奈何太公曰夫士外貌不與衆情相應者十五有賢而不肖者有温良而為盜者有貌恭敬而心慢者有外謙謹而内無恭敬者有精精而無情者有湛湛而無誠者有好謀而決者有如果敢而不能者有悾悾而不信者有恍恍惚惚而反忠實者有詭激而有功効者有外勇而内怯者有肅肅而反易人者有嗃嗃而反靜慤者有勢虚形劣而出外無所不至無使不遂者天下所賤聖人所貴凡人不知非有大明不見其際此士之外貌不與中情相應者也武王曰何以知之太公曰知之有八徵一曰問之以言以觀其詳二曰窮之以辭以觀其變三曰與之間諜以觀其誠四曰明白顯問以觀其徳五曰使之以財以觀其㢘六曰試之以色以觀其貞七曰告之以難以觀其勇八曰醉之以酒以觀其態八徵皆備則賢不肖别矣立將第二十一武王問太公曰立將之道奈何太公曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍今某國不臣願將軍帥師應之也將既受命乃命太史卜齋三日之太廟鑽靈龜卜吉日以受斧鉞君入廟門西面而立將入廟門北面而立君親操鉞持首授將其柄曰從此上至天者將軍制之復操斧持柄授將其刃曰從此下至淵者將軍制之見其虚則進見其實則止勿以三軍為衆而輕敵勿以受命為重而必死勿以身貴而賤人勿以獨見而違衆勿以辯說為必然也士未坐勿坐士未食勿食寒暑必同如此士衆必盡死力將已受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣既受命専斧鉞之威臣不敢生還願君亦垂一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不聞君命皆由將出臨敵決戰無有二心若此則無天於上無地於下無敵於前無君於後是故智者為之謀勇者為之鬭氣厲青雲疾若馳鶩兵不接刃而敵降服戰勝於外功立於内吏遷上賞百姓歡悅將無咎殃是故風雨時節五榖豐登社稷安寧武王曰善哉將威第二十二武王問太公曰將何以為威何以為明何以為禁止而令行太公曰將以誅大為威以賞小為明以罰審為禁止而令行故殺一人而三軍震者殺之賞一人而萬人說者賞之殺貴大賞貴小殺其當路貴重之人是刑上極也賞及牛竪馬洗廐養之徒是賞下通也刑上極賞下通是將威之所行也厲軍第二十三武王問太公曰吾欲三軍之衆攻城爭先登野戰爭先赴聞金聲而怒聞鼓聲而喜為之奈何太公曰將有三勝武王曰敢問其目太公曰將冬不服裘夏不操扇雨不張葢名曰禮將將不身服禮無以知士卒之寒暑出隘塞犯泥塗將必先下步名曰力將將不身服力無以知士卒之勞苦軍皆定次將乃就舎炊者皆熟將乃就食軍不舉火將亦不舉名曰止欲將將不身服止欲無以知士卒之饑飽將與士卒共寒暑勞苦饑飽故三軍之衆聞鼓聲則喜聞金聲則怒髙城深池矢石繁下士爭先登白刃始合士爭先赴士非好死而樂傷也為其將知寒暑饑飽之審而見勞苦之明也陰符第二十四武王問太公曰引兵深入諸侯之地三軍卒有緩急或利或害吾將以近通逺從中應外以給三軍之用為之奈何太公曰主與將有陰符凡八等有大勝克敵之符長一尺破軍殺將之符長九寸降城得邑之符長八寸郤敵報逺之符長七寸誓衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使行符稽留者若符事泄聞者告者皆誅之八符者主將秘聞所以陰通言語不泄中外相知之術敵雖聖智莫之能識武王曰善哉陰書第二十五武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事繁多符不能明相去遼逺言語不通為之奈何太公曰諸有陰事大慮當用書不用符主以書遺將將以書問主書皆一合而再離三𤼵而一知再離者分書為三部三𤼵而一知者言三人人操一分相叅而不使知情也此謂陰書敵雖聖智莫之能識武王曰善哉軍勢第二十六武王問太公曰攻伐之道奈何太公曰勢因於敵家之動變生于兩陣之間奇正𤼵于無窮之源故至事不語用兵不言且事之至者其言不足聽也兵之用者其狀不定見也倐而往倐而來能獨専而不制者兵也聞則議見則圖知則困辨則危故善戰者不待張軍善除患者理于未生勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良將也設備於己失之後者非上聖也智與衆同非國師也技與衆同非國工也事莫大于必克用莫大於𤣥黙動莫大於不意謀莫大於不識夫先勝者先見弱於敵而後戰者也故士半而功倍焉聖人徵于天地之動孰知其紀循陰陽之道而從其候當天地盈縮因以為常物有死生因天地之形故曰未見形而戰雖衆必敗善戰者居之不撓見勝則起不勝則止故曰無恐懼無猶豫用兵之害猶豫為大三軍之災莫過狐疑善戰者見利不失遇時不疑失利後時反受其殃故智者從之而不失巧者一決而不猶豫是以疾雷不及掩耳迅電不及瞑目赴之若驚用之若狂當之者破近之者亾孰能禦之夫將有所不言而守者神也有所不見而視者明也故知神明之道者野無横敵對無立國武王曰善哉奇兵第二十七武王問太公曰凡用兵之法大要何如太公曰古之善戰者非能戰於天上非能戰于地下其成與敗皆由神勢得之者昌失之者亾夫兩陣之間出甲陳兵縱卒亂行者所以為變也深草蓊蘙者所以遁逃也谿谷險阻者所以止車禦騎也隘塞山林者所以少擊衆也坳澤窈㝠者所以匿其形也清明無隠者所以戰勇力也疾如流矢擊如𤼵機者所以破精微也詭伏設奇逺張誑誘者所以破軍擒將也四分五裂者所以擊圓破方也因其驚駭者所以一擊十也因其勞倦暮舎者所以十擊百也奇技者所以越深水渡江河也强弩長兵者所以踰水戰也長闗逺堠暴疾謬遁者所以降城服邑也鼓行讙囂者所以行奇謀也大風甚雨者所以摶前擒後也偽稱敵使者所以絶糧道也謬號令與敵同服者所以備走北也戰必以義者所以勵衆勝敵也尊爵重賞者所以勸用命也嚴刑重罰者所以進罷怠也一喜一怒一予一奪一文一武一徐一疾者所以調和三軍制一臣下也處髙敞者所以警守也保險阻者所以為固也山林茂穢者所以黙往來也深溝髙壘積糧多者所以持久也故曰不知戰攻之䇿不可以語敵不能分移不可以語奇不通治亂不可以語變故曰將不仁則三軍不親將不勇則三軍不銳將不智則三軍大疑將不明則三軍大傾將不精微則三軍失其機將不常戒則三軍失其備將不强力則三軍失其職故將者人之司命三軍與之俱治與之俱亂得賢將者兵强國昌不得賢將者兵弱國亡武王曰善哉五音第二十八武王問太公曰律音之聲可以知三軍之消息勝負之決乎太公曰深哉王之問也夫律管十二其要有五音宫商角徵羽此真正聲也萬代不易五行之神道之常也金木水火土各以其勝攻也古者三皇之世虚無之情以制剛强無有文字皆由五行五行之道天地自然六甲之分微妙之神其法以天清淨無陰雲風雨夜半遣輕騎往至敵人之壘去九百步外徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徵聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徵成敗之機武王曰善哉太公曰微妙之音皆有外候武王曰何以知之太公曰敵人驚動則聽之聞枹鼓之音者角也見火光者徵也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五音者聲色之符也兵徵第二十九武王問太公曰吾欲未戰先知敵人之强弱豫見勝負之徵為之奈何太公曰勝負之徵精神先見明將察之其效在人謹候敵人出入進退察其動靜言語妖祥士卒所告凡三軍悅懌士卒畏法敬其將命相喜以破敵相陳以勇猛相賢以威武此强徵也三軍數驚士卒不齊相恐以强敵相語以不利耳目相屬妖言不止衆口相惑不畏法令不重其將此弱徵也三軍齊整陣勢以固深溝髙壘又有大風甚雨之利三軍無故旌旗前指金鐸之聲揚以清鼙鼓之聲宛以鳴此得神明之助大勝之徵也行陣不固旌旗亂而相遶逆大風甚雨之利士卒恐懼氣絶而不屬戎馬驚奔兵車折軸金鐸之聲下以濁鼙鼓之聲濕以沐此大敗之徵也凡攻城圍邑城之氣色如死灰城可屠城之氣出而北城可克城之氣出而西城可降城之氣出而南城不可抜城之氣出而東城不可攻城之氣出而復入城主逃北城之氣出而覆我軍之上軍必病城之氣出髙而無所止用兵長久凡攻城圍邑過旬不雷不雨必亟去之城必有大輔此所以知可攻而攻不可攻而止武王曰善哉農器第三十武王問太公曰天下安定國家無爭戰攻之具可無修乎守禦之備可無設乎太公曰戰攻守禦之具盡在於人事耒耜者其行馬蒺藜也馬牛車輿者其營壘蔽櫓也鋤䥳之具其矛㦸也蓑篩簦笠其甲胄干櫓也钁鍤斧鋸杵臼其攻城器也牛馬所以轉輸糧也雞犬其伺候也婦人織絍其旌旗也丈夫平壤其攻城也春鏺草棘其戰車騎也夏耨田疇其戰步兵也秋刈禾薪其糧食儲備也冬實倉廩其堅守也田里相伍其約束符信也里有吏官有長其將帥也里有周垣不得相過其隊分也輸粟取芻其廩庫也春秋治城郭修溝渠其塹壘也故用兵之具盡于人事也善為國者取於人事故必使遂其六畜闢其田野究其處所丈夫治田有畝數婦人織絍有尺度是富國强兵之道也武王曰善哉
