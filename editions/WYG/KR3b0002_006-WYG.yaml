body:
  text: 六韜卷六犬韜分合第五十一武王問太公曰王者帥師三軍分為數處將欲期㑹合戰約誓賞罰為之奈何太公曰凡用兵之法三軍之衆必有分合之變其大將先定戰地戰日然後移檄書與諸將吏期攻城圍邑各會其所明告戰日漏刻有時大將設營而陣立表轅門清道而待諸將吏至者校其先後先期至者賞後期至者斬如此則逺近奔集三軍俱至并力合戰武鋒第五十二武王問太公曰凡用兵之要必有武車驍騎馳陣選鋒見可則擊之如何而可擊太公曰夫欲擊者當審察敵人十四變變見則擊之敵人必敗武王曰十四變可得聞乎太公曰敵人新集可擊人馬未食可擊天時不順可擊地形未得可擊奔走可擊不戒可擊疲勞可擊將離士卒可擊涉長路可擊濟水可擊不暇可擊阻難狹路可擊亂行可擊心怖可擊練士第五十三武王問太公曰練士之道奈何太公曰軍中有大勇力敢死樂傷者聚為一卒名曰冒刃之士有銳氣壯勇强暴者聚為一卒名曰陷陣之士有披距伸鉤强梁多力潰破金鼓絶滅旌旗者聚為一卒名曰勇力之士有踰髙絶逺輕足善走者聚為一卒名曰冦兵之士有王臣失勢欲復見功者聚為一卒名曰死鬬之士有死將之人子弟欲為其將報仇者聚為一卒名曰死憤之士有貧窮忿怒欲怏其志者聚為一卒名曰必死之士有贅壻人虜欲揜迹揚名者聚為一卒名曰勵鈍之士有胥靡免罪之人欲逃其耻者聚為一卒名曰幸用之士有材技兼人能負重致逺者聚為一卒名曰待命之士此軍之練士不可不察也教戰第五十四武王問太公曰合三軍之衆欲令士卒服習教戰之道奈何太公曰凡領三軍必有金鼓之節所以整齊士衆者也將必先明告吏士申之以三令以教操兵起居旌旗指麾之變法故教吏士使一人學戰教成合之十人十人學戰教成合之百人百人學戰教成合之千人千人學戰教成合之萬人萬人學戰教成合之三軍之衆大戰之法教成合之百萬之衆故能成大兵立威於天下武王曰善哉均兵第五十五武王問太公曰以車與步卒戰一車當幾步卒幾步卒當一車以騎與步卒戰一騎當幾步卒幾步卒當一騎以車與騎戰一車當幾騎幾騎當一車太公曰車者軍之羽翼也所以陷堅陣要强敵遮走北也騎者軍之伺候也所以踵敗軍絶糧道擊便冦也故車騎不敵戰則一騎不能當步卒一人三軍之衆成陣而相當則易戰之法一車當步卒八十人八十人當一車一騎當步卒八人八人當一騎一車當十騎十騎當一車險戰之法一車當步卒四十人四十人當一車一騎當步卒四人四人當一騎一車當六騎六騎當一車夫車騎者軍之武兵也十乘敗千人百乘敗萬人十騎走百人百騎走千人此其大數也武王曰車騎之吏數陣法奈何太公曰置車之吏數五車一長十車一吏五十車一率百車一將易戰之法五車為列相去四十步左右十步隊間六十步險戰之法車必循道十車為聚二十車為屯前後相去二十步左右六步隊間三十六步五車一長縱横相去一里各返故道置旗之吏數五騎一長十騎一吏百騎一卒二百騎一將易戰之法五騎為列前後相去二十步左右四步隊間五十步險戰者前後相去十步左右二步隊間二十五步三十騎為一屯六十騎為一軰十騎一吏縱横相去百步周還各後復故處武王曰善哉武車士第五十六武王問太公曰選車士奈何太公曰選車士之法取年四十以下長七尺五寸以上走能逐奔馬及馳而乘之前後左右上下周旋能束縛旌旗力能彀八石弩射前後左右皆便習者名曰武車之士不可不厚也武騎士第五十七武王問太公曰選騎士奈何太公曰選騎士之法取年四十以下長七尺五寸以上壯徤㨗疾超絶倫等能馳騎彀射前後左右周旋進退越溝塹登丘陵冒險阻絶大澤馳强敵亂大衆者名曰武騎之士不可不厚也戰車第五十八武王問太公曰戰車奈何太公曰步貴知變動車貴知地形騎貴知别徑奇道三軍同名而異用也凡車之戰死地有十其勝地有八武王曰十死之地奈何太公曰往而無還者車之死地也越絶險阻乘敵逺行者車之竭地也前易後險者車之困地也陷之險阻而難出者車之絶地也圯下漸澤黒土黏埴者車之勞地也左險右易上陵仰阪者車之逆地也殷草横畝犯厯浚澤者車之拂地也車少地易與步不敵者車之敗地也後有溝瀆左有深水右有峻阪者車之壊地也日夜霖雨旬日不止道路潰陷前不能進後不能解者車之陷地也此十者車之死地也故拙將之所以見擒明將之所以能避也武王曰八勝之地奈何太公曰敵之前後行陣未定即陷之旌旗擾亂人馬數動即陷之士卒或前或後或左或右即陷之陣不堅固士卒前後相顧即陷之前往而疑後往而怯即陷之三軍卒驚皆薄而起即陷之戰于易地暮不能解即陷之逺行而暮舎三軍恐懼即陷之此八者車之勝地也將明于十害八勝敵雖圍周千乘萬騎前驅旁馳萬戰必勝武王曰善哉戰騎第五十九武王問太公曰戰騎奈何太公曰騎有十勝九敗武王曰十勝奈何太公曰敵人始至行陳未定前後不屬陷其前騎擊其左右敵人必走敵人行陣整齊堅固士卒欲鬭吾騎翼而勿去或馳而往或馳而來其疾如風其暴如雷白晝如昏數更旌旌變易衣服其軍可克敵人行陣不固士卒不鬬薄其前後獵其左右翼而擊之敵人必懼敵人暮欲歸舎三軍恐駭翼其兩旁疾擊其後薄其壘口無使得入敵人必敗敵人無險阻保固深入長驅絶其糧道敵人必饑地平而易四面見敵車騎陷之敵人必亂敵人奔走士卒散亂或翼其兩旁或掩其前後其將可擒敵人暮返其兵甚衆其行陣必亂令我騎十而為隊百而為屯車五而為聚十而為羣多設旌旗雜以强弩或擊其兩旁或絶其前後敵將可虜此騎之十勝也武王曰九敗奈何太公曰凡以騎陷敵而不能破陣敵人佯走以車騎反擊我後此騎之敗地也追北踰險長驅不止敵人伏我兩旁又絶我後此騎之圍地也往而無以返入而無以出是謂陷于天井頓於地穴此騎之死地也所從入者隘所從出者逺彼弱可以擊我强彼寡可以擊我衆此騎之没地也大澗深谷翳茂林木此騎之竭地也左右有水前有大阜後有髙山三軍敗于兩水之間敵居表裏此騎之艱地也敵人絶我糧道往而無以還此騎之困地也汙下沮澤進退漸洳此騎之患地也左有深溝右有坑阜髙下如平地進退誘敵此騎之陷地也此九者騎之死地也明將之所以逺避闇將之所以陷敗也戰步第六十武王問太公曰步兵與車騎戰奈何太公曰步兵與車騎戰者必依丘陵險阻長兵强弩居前短兵强弩居後更𤼵更止敵之車騎雖衆而至堅陣疾戰材士强弩以備我後武王曰吾無丘陵又無險阻敵人之至既衆且武車騎翼我兩旁獵我前後吾三軍恐怖亂散而走為之奈何太公曰令我士卒為行馬木蒺藜置牛馬隊伍為四武衝陣望敵車騎將來均置蒺藜掘地匝後廣深五尺名曰命籠人操行馬進步䦨車以為壘推而前後立而為屯材士强弩備我左右然後令我三軍皆疾戰而不解武王曰善哉六韜卷六
