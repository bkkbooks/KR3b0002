seq: 1
front:
  text: 文王將田史編布卜曰田於渭陽將大得焉非龍非彲非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王曰兆致是乎史編曰編之太祖史疇為舜占得皋陶兆比於此文王乃齋三日乘田車駕田馬田於渭陽卒見太公坐茅以漁文王勞而問之曰子樂漁耶太公曰君子樂得其志小人樂得其事今吾漁甚有似也文王曰何謂其有似也太公曰釣有三權祿等以權死等以權官等以權夫釣以求得也其情深可以觀大矣文王曰願聞其情太公曰源深而水流水流而魚生之情也根深而木長木長而實生之情也君子情同而親合親合而事生之情也言語應對者情之飾也言至情者事之極也今臣言至情不諱君其惡之乎文王曰惟仁人能受正諫不惡至情何為其然太公曰緡微餌明小魚食之緡綢餌香中魚食之緡隆餌豐大魚食之夫魚食其餌乃牽於緡人食其祿乃服于君故以餌取魚魚可殺以祿取人人可竭以家取國國可抜以國取天下天下可畢嗚呼曼曼緜緜其聚必散嘿嘿昧昧其光必逺微哉聖人之徳誘乎獨見樂哉聖人之慮各歸其次而立斂焉文王曰立歛何若而天下歸之太公曰天下非一人之天下乃天下之天下也同天下之利者則得天下擅天下之利者則失天下天有時地有財能與人共之者仁也仁之所在天下歸之免人之死解人之難救人之患濟人之急者徳也徳之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下赴之凡人惡死而樂生好徳而歸利能生利者道也道之所在天下歸之文王再拜曰允哉敢不受天之詔命乎乃載與俱歸立為師
