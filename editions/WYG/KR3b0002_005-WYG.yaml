  text: 六韜卷四欽定四庫全書
  hash: sha256:82c6ef1e57805ee742ea0aca1a0c98b36c974334100d670a73499bbbcd5b3434
  markers:
  - {type: page-break, offset: 4, content: '', id: KR3b0002_WYG_005-1a, image: WYG0726/WYG0726-0034c.png}
body:
  text: 六韜卷五豹韜林戰第四十三武王問太公曰引兵深入諸侯之地遇大林與敵人分林相拒吾欲以守則固以戰則勝為之奈何太公曰使吾三軍分為衝陣便兵所處弓弩為表㦸楯為裏斬除草木極廣吾道以便戰所髙置旌旗謹勅三軍無使敵人知吾之情是謂林戰林戰之法率吾矛㦸相與為伍林間木疎以騎為輔戰車居前見便則戰不見便則止林多險阻必置衝陣以備前後三軍疾戰敵人雖衆其將可走更戰更息各按其部是謂林戰之紀突戰第四十四武王問太公曰敵人深入長驅侵掠我地驅我牛馬其三軍大至薄我城下吾士卒大恐人民繫累為敵所虜吾欲以守則固以戰則勝為之奈何太公曰如此者謂之突兵其牛馬必不得食士卒絶糧暴擊而前令我逺邑别軍選其銳士疾擊其後審其期日必會於晦三軍疾戰敵人雖衆其將可虜武王曰敵人分為三四或戰而侵掠我地或止而收我牛馬其大軍未盡至而使冦薄我城下致吾三軍恐懼為之奈何太公曰謹候敵人未盡至則設備以待之去城四里而為壘金鼓旌旗皆列而張别隊為伏兵令我壘上多積强弩百步一突門門有行馬車騎居外勇力銳士隠伏而處敵人若至使我輕卒合戰而佯走令我城上立旌旗擊鼙鼓完為守備敵人以我為守城必薄我城下𤼵吾伏兵以衝其内或擊其外三軍疾戰或擊其前或擊其後勇者不得鬬輕者不及走名曰突戰敵人雖衆其將必走武王曰善哉敵强第四十五武王問太公曰引兵深入諸侯之地與敵人衝軍相當敵衆我寡敵强我弱敵人夜來或攻吾左或攻吾右三軍震動吾欲以戰則勝以守則固為之奈何太公曰如此者謂之震冦利以出戰不可以守選吾材士强弩車騎為左右疾擊其前急攻其後或擊其表或擊其裏其卒必亂其將必駭武王曰敵人逺遮我前急攻我後㫁我銳兵絶我材士吾内外不得相聞三軍擾亂皆敗而走士卒無鬬志將吏無守心為之奈何太公曰明哉王之問也當明號審令出我勇銳冒將之士人操炬火二人同鼓必知敵人所在或擊其表裏微號相知令之滅火鼓音皆止中外相應期約相當三軍疾戰敵必敗亡武王曰善哉敵武第四十六武王問太公曰引兵深入諸侯之地卒遇敵人甚衆且武武車驍騎繞我左右吾三軍皆震走不可止為之奈何太公曰如此者謂之敗兵善者以勝不善者以亡武王曰為之奈何太公曰伏我將士强弩武車驍騎為之左右當去前後三里敵人逐我𤼵我車騎衝其左右如此則敵人擾亂吾走者自止武王曰敵人與我車騎相當敵衆我少敵强我弱其來整治精鋭吾陣不敢當為之奈何太公曰選我材士强弩伏于左右車騎堅陣而處敵人過我伏兵積弩射其左右車騎銳兵疾擊其軍或擊其前或擊其後敵人雖衆其將必走武王曰善哉烏雲山兵第四十七武王問太公曰引兵深入諸侯之地遇髙山盤石其上亭亭無有草木四面受敵吾三軍恐懼士卒迷惑吾欲以守則固以戰則勝為之奈何太公曰凡三軍處山之髙則為敵所棲處山之下則為敵所囚既以被山而處必為烏雲之陣烏雲之陣陰陽皆備或屯其陰或屯其陽處山之陽備山之陰處山之陰備山之陽處山之左備山之右處山之右備山之左敵所能陵者兵備其表衢道通谷絶以武車髙置旌旗謹勅三軍無使敵人知吾之情是謂山城行列已定士卒已陣法令已行奇正已設各置衝陣於山之表便兵所處乃分車騎為烏雲之陣三軍疾戰敵人雖衆其將可擒烏雲澤兵第四十八武王問太公曰引兵深入諸侯之地與敵人臨水相拒敵富而衆我貧而寡踰水擊之則不能前欲久其日則糧食少吾居斥鹵之地四旁無邑又無草木三軍無所掠取牛馬無所芻牧為之奈何太公曰三軍無備牛馬無食士卒無糧如此者索便詐敵而亟去之設伏兵於後武王曰敵不可得而詐吾士卒迷惑敵人越我前後吾三軍敗而走為之奈何太公曰求途之道金玉為主必因敵使精微為寳武王曰敵人知我伏兵大軍不肻濟别將分隊以踰于水吾三軍大恐為之奈何太公曰如此者分為衝陣便兵所處須其畢出𤼵其伏兵疾擊其後强弩兩旁射其左右車騎分為烏雲之陣備其前後三軍疾戰敵人見我戰合其大軍必濟水而來𤼵我伏兵疾擊其後車騎衝其左右敵人雖衆其將可走凡用兵之大要當敵臨戰必置衝陣便兵所處然後以車騎分為烏雲之陣此用兵之奇也所謂烏雲者烏散而雲合變化無窮者也武王曰善哉少衆第四十九武王問太公曰吾欲以少擊衆以弱擊强為之奈何太公曰以少擊衆者必以日之暮伏於深草要之隘路以弱擊强者必得大國之與鄰國之助武王曰我無深草又無隘路敵人已至不適日暮我無大國之與又無鄰國之助為之奈何太公曰妄張詐誘以熒惑其將迂其途令過深草逺其路令會日暮前行未渡水後行未及舎𤼵我伏兵疾擊其左右車騎擾亂其前後敵人雖衆其將可走事大國之君下鄰國之士厚其幣卑其辭如此則得大國之與鄰國之助矣武王曰善哉分險第五十武王問太公曰引兵深入諸侯之地與敵人相遇於險阨之中吾左山而右水敵右山而左水與我分險相拒吾欲以守則固以戰則勝為之奈何太公曰處山之左急備山之右處山之右急備山之左險有大水無舟楫者以天潢濟吾三軍已濟者亟廣吾道以便戰所以武衝為前後列其强弩令行陣皆固衢道谷口以武衝絶之髙置旌旗是謂軍城凡險戰之法以武衝為前大櫓為衛材士强弩翼吾左右三千人為一屯必置衝陣便兵所處左軍以左右軍以右中軍以中並攻而前已戰者還歸屯所更戰更息必勝乃已武王曰善哉六韜卷五
