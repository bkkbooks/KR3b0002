  text: 欽定四庫全書子部二
  hash: sha256:7e32dae4903853b48f89828e61d4081cf4abc5e504c25d2bc384a1194cb036b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_WYG_000-1a, image: WYG0726/WYG0726-0009a.png}
body:
  text: 六韜兵家類提要臣等謹案六韜六卷舊本題周吕望撰考荘子徐無鬼篇稱金版六弢經典釋文曰司馬彪崔譔云金板六弢皆周書篇名本又作六韜謂太公六韜文武虎豹龍犬也案今本以文武龍虎豹犬為次與陸徳明所註不同未詳就是謹附識於此則戰國之初原有是名然即以為太公六韜未知所據漢書藝文志兵家不著録惟儒家有周史六弢六篇班固自註曰惠㐮之間或曰顯王時或曰孔子問焉則六弢别為一書顏師古註以今之六韜當之毋亦因陸徳明之説而牽合附會歟三國志先生傳註始稱閒暇厯觀諸子及六韜商君書益人志意隋志始載太公六韜五卷註曰梁六卷周文王師姜望撰唐宋諸志皆因之今考其文大抵詞意淺近不類古書中間如避正殿乃戰國以後之事將軍二字始見左傳周初亦無此名案路史有虞舜時伯益為百蟲將軍之語襍説依託不足為據其依托之迹灼然可騐又龍韜中有隂符篇云主與將有隂符凡八等克敵之符長一尺破軍之符長九寸至失利之符長三寸而止葢偽撰者不知隂符之義誤以為符節之符遂粉飾以為此言尤為鄙陋殆未必漢時舊本故周氏渉筆謂其書並縁呉起漁獵其詞而綴輯以近代軍政之浮談淺駁無可施用胡應麟筆叢亦謂其文伐隂書等篇為孫呉尉繚所不屑道然晁公武讀書志稱元豐中以六韜孫子呉子司馬法黄石公三畧尉繚子李衛公問對頒行武學號曰七書則其來已乆談兵之家恒相稱述今故仍録存之而備論其蹖駁如右乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書六韜卷一文韜文師第一
