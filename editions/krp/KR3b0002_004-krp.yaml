front:
  text: 六韜卷第四虎韜
  hash: sha256:7b45970d4f01a0107dee8860ae55f53868ef36e6b73fea5317d35cdc9ed4f162
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_SBCK_004-1a}
body:
  text: 軍用武王問太公曰王者舉兵三軍器用攻守之具科品衆寡豈有法乎太公曰大哉王之問也夫攻守之具各有科品此兵之大威也武王曰願聞之太公曰凡用兵之大數將甲士萬人法用武衝大扶胥三十六乗材士強弩矛㦸爲翼一車二十四人推之以八尺車輪車上立旗鼓兵法謂之震駭䧟堅陳敗強敵武翼大櫓矛㦸扶胥七十二具材士強弩矛㦸爲翼以五尺車輪絞車連弩自副䧟堅陳敗強敵提翼小櫓扶胥一百四十具絞車連弩自副以鹿車輪䧟堅陳敗強敵大黄參連弩大扶胥三十六乗材士強弩矛㦸爲翼飛鳬電影自副飛鳬赤莖白羽以銅爲首電影青莖赤羽以鐵爲首晝則以綘縞長六尺廣六寸爲光耀夜則以白縞長六尺廣六寸爲流星䧟堅陳敗歩騎大扶胥衝車三十六乗螳蜋武士共載可以縱擊橫可以敗敵輜車騎宼一名電車兵法謂之電擊䧟堅陳敗歩騎宼夜來前矛㦸扶胥輕車一百六十乗螳蜋武士三人共載兵法謂之霆擊䧟堅陳敗歩騎方首鐵棓維朌重十二斤柄長五尺以上千二百枚一名天棓大柯斧刃長八寸重八斤柄長五尺以上千二百枚一名天鉞方首鐵鎚重八斤柄長五尺以上千二百枚一名天鎚敗歩騎羣宼飛鈎長八寸鈎芒長四寸柄長六尺以上千二百枚以投其衆三軍拒守木螳蜋劒刃扶胥廣二丈百二十具一名行馬平易地以歩兵敗車騎木蒺藜去地二尺五寸百二十具敗歩騎要窮宼遮走北軸旋短衝矛㦸扶胥百二十具黄帝所以敗蚩尤氏敗歩騎要窮宼遮走北狹路微徑張鐵蒺藜芒髙四寸廣八寸長六尺以上千二百具敗歩騎突暝來前促戰白刃接張地羅鋪兩鏃蒺藜參連織女芒間相去二寸萬二千具曠野草中方匈鋋矛千二百具張鋋矛法髙一尺五寸敗歩騎要窮宼遮走北狹路微徑地䧟鐵械鎻參連百二十具敗歩騎要窮宼遮走北壘門拒守矛㦸小櫓十二具絞車連弩自副三軍拒守天羅虎落鎻連一部廣一丈五尺髙八尺百二十具虎落劒刃扶胥廣一丈五尺髙八尺五百二十具渡溝壍飛橋一間廣一丈五尺長二丈以上着轉關轆轤八具以環利通索張之渡大水飛江廣一丈五尺長二丈以上八具以環利通索張之天浮鐵螳蜋矩内圎外徑四尺以上環絡自副三十二具以天浮張飛江濟大海謂之天潢一名天舡山林野居結虎落柴營環利鐵鎻長二丈以上千二百枚環利大通索大四寸長四丈以上六百枚環利中通索大二寸長四丈以上二百枚環利小徽縲長二丈以上萬二千枚天雨蓋重車上板結枲鉏鋙廣四尺長四丈以上車一具以鐵杙張之伐木大斧重八斤柄長三尺以上三百枚棨钁刃廣六寸柄長五尺以上三百枚銅築固爲垂長五尺以上三百枚鷹瓜方匈鐵杷柄長七尺以上三百枚方匈鐵义柄長七尺以上三百枚方匈兩枝鐵义柄長七尺以上三百枚芟草木大鎌柄長七尺以上三百枚大櫓刀重八斤柄長六尺三百枚委環鐵杙長三尺以上三百枚㭬杙大鎚重五斤柄長二尺以上百二十具甲士萬人強弩六千㦸楯二千矛楯二千修治攻具砥礪兵器巧手三百人此舉兵軍用之大數也武王曰允哉三陳武王問太公曰凡用兵爲天陳地陳人陳奈何太公曰日月星辰斗杓一左一右一向一背此謂天陳丘陵水泉亦有前後左右之利此謂地陳用車用馬用文用武此謂人陳武王曰善哉疾戰武王問太公曰敵人圍我斷我前後絶我糧道爲之奈何太公曰此天下之困兵也暴用之則勝徐用之則敗如此者爲四武衝陳以武車驍騎驚亂其軍而疾擊之可以横行武王曰若巳出圍地欲因以爲勝爲之奈何太公曰左軍疾左右軍疾右無與敵人爭道中軍迭前迭後敵人雖衆其將可走必出武王問太公曰引兵深入諸侯之地敵人四合而圍我斷我歸道絶我糧食敵人旣衆糧食甚多險阻又固我欲必出爲之奈何太公曰必出之道器械爲寶勇闘爲首審知敵人空虚之地無人之處可以必出將士人持玄旗操器械設銜枚夜出勇力飛足冒將之士居前平壘爲軍開道材士強弩爲伏兵居後弱卒車騎居中陳畢徐行愼無驚駭以武衝扶胥前後拒守武翼大櫓以備左右敵人若驚勇力冒將之士疾擊而前弱卒車騎以屬其後材士強弩隱伏而處審候敵人追我伏兵疾擊其後多其火鼓若從地出若從天下三軍勇鬪莫我能禦武王曰前有大水廣壍深坑我欲踰渡無舟楫之備敵人屯壘限我軍前塞我歸道厈候常戒險塞盡中車騎要我前勇士擊我後爲之奈何太公曰大水廣壍深坑敵人所不守或能守之其卒必寡若此者以飛江轉關與天潢以濟吾軍勇力材士從我所指衝敵絶陳皆致其死先燔吾輜重燒吾糧食明告吏士勇鬪則生不勇則死巳出者令我踵軍設雲火逺候必依草木丘墓險阻敵人車騎必不敢逺追長驅因以火爲記先岀者令至火而止爲四武衝陳如此則吾三軍皆精銳勇鬪莫我能止武王曰善哉軍略武王問太公曰引兵深入諸侯之地遇深谿大谷險阻之水吾三軍未得畢濟而天暴雨流水大至後不得屬於前無有舟梁之備又無水草之資吾欲畢濟使三軍不稽留爲之奈何太公曰凡帥師將衆慮不先設器械不備敎不素信士卒不習若此不可以爲王者之兵也凡三軍有大事莫不習用器械攻城圍邑則有轒輼臨衝視城中則有雲梯飛樓三軍行止則有武衝大櫓前後拒守絶道遮街則有材士強弩衝其兩旁設營壘則有天羅武落行馬蒺藜晝則登雲梯逺望立五色旗旌夜則設雲火萬炬擊雷皷振鼙鐸吹鳴笳越溝壍則有飛橋轉關轆轤鉏鋙濟大水則有天潢飛江逆波上流則有浮海絶江三軍用備主將何憂臨境武王問太公曰吾與敵人臨境相拒彼可以來我可以徃陳皆堅固莫敢先舉我欲徃而襲之彼亦可來爲之奈何太公曰分兵三處令軍前軍深溝増壘而無岀列旌旗擊鼙皷完爲守備令我後軍多積糧食無使敵人知我意發我銳士濳襲其中擊其不意攻其無備敵人不知我情則止不來矣武王曰敵人知我之情通我之謀動而得我事其銳士伏於深草要隘路擊我便處爲之柰何太公曰令我前軍日出挑戰以勞其意令我老弱拽柴揚塵鼓呼而徃來或出其左或出其右去敵無過百歩其將必勞其卒必駭如此則敵人不敢來吾徃者不止或襲其内或擊其外三軍疾戰敵人必敗動靜武王問太公曰引兵深入諸侯之地與敵之軍相當兩陳相望衆寡彊弱相等未敢先舉吾欲令敵人將帥恐懼士卒心傷行陳不固後陳欲走前陳數顧鼓譟而乗之敵人遂走爲之柰何太公曰如此者發我兵去宼十里而伏其兩旁車騎百里而越其前後多其旌旗益其金鼓戰合鼓譟而俱起敵將必恐其軍驚駭衆寡不相救貴賤不相待敵人必敗武王曰敵之地勢不可以伏其兩旁車騎又無以越其前後敵知我慮先施其備我士卒心傷將帥恐懼戰則不勝爲之奈何太公曰微哉王之問也如此者先戰五日發我逺候往視其動靜審候其來設伏而待之必於死地與敵相避逺我旌旗䟽我行陳必奔其前與敵相當戰合而走擊金無止三里而還伏兵乃起或䧟其兩旁或擊其前後三軍疾戰敵人必走武王曰善哉金鼓武王問太公曰引兵深入諸侯之地與敵相當而天大寒甚暑日夜霖雨旬日不止溝壘悉壊隘塞不守斥候懈怠士卒不戒敵人夜來三軍無備上下惑亂爲之柰何太公曰凡三軍以戒爲固以怠爲敗令我壘上誰何不絶人執旌旗外内相望以號相命勿令乏音而皆外向三千人爲一屯誡而約之各愼其處敵人若來親我軍之警戒至而必還力盡氣怠發我銳士隨而擊之武王曰敵人知我隨之而伏其銳士佯北不止過伏而還或擊我前或擊我後或薄我壘吾三軍大恐擾亂失次離其處所爲之柰何太公曰分爲三隊隨而追之勿越其伏三隊俱至或擊其前後或䧟其兩旁明號審令疾擊而前敵人必敗絶道武王問太公曰引兵深入諸侯之地與敵相守敵人絶我粮道又越我前後吾欲戰則不可勝欲守則不可乆爲之柰何太公曰凡深入敵人之地必察地之形勢務求便利依山林險阻水泉林木而爲之固謹守關梁又知城邑丘墓地形之利如是則我軍堅固敵人不能絶我粮道又不能越我前後武王曰吾三軍過大陵廣澤平易之地吾盟誤失卒與敵人相薄以戰則不勝以守則不固敵人翼我兩旁越我前後三軍大恐爲之柰何太公曰凡帥師之法當先發逺候去敵二百里審知敵人所在地勢不利則以武衞爲壘而前又置兩踵軍於後逺者百里近者五十里即有警急前後相救吾三軍常完堅必無毁傷武王曰善哉略地武王問太公曰戰勝深入略其地有大城不可下其別軍守險與我相拒我欲攻城圍邑恐其别軍卒至而擊我中外相合擊我表裏三軍大亂上下恐駭爲之奈何太公曰凡攻城圍邑車騎必逺屯衛警戒阻其外内中人絶糧外不得輸城人恐怖其將必降武王曰中人絶糧外不得輸隂爲約誓相與密謀夜出窮宼死戰其車騎銳士或衝我内或擊我外士卒迷惑三軍敗亂爲之奈何太公曰如此者當分軍爲三軍謹視地形而處審知敵人别軍所在及其大城别堡爲之置遺缺之道以利其心謹備勿失敵人恐懼不入山林即歸大邑走其别軍車騎逺要其前勿令遺脫中人以爲先出者得其徑道其練卒材士必出其老弱獨在車騎深入長驅敵人之軍必莫敢至愼勿與戰絶其糧道圍而守之必乆其日無燔人積聚無壞人宫室冡樹社叢勿伐降者勿殺得而勿戮示之以仁義施之以厚德令其士民曰罪在一人如此則天下和服武王曰善哉火戰武王問太公曰引兵深入諸侯之地遇深草蓊穢周吾軍前後左右三軍行數百里人馬疲倦休止敵人因天燥疾風之利燔吾上風車騎銳士堅伏吾後吾三軍恐怖散亂而走爲之奈何太公曰若此者則以雲梯飛樓逺望左右謹察前後見火起即燔吾前而廣延之又燔吾後敵人若至則引軍而却桉黒地而堅處敵人之來猶在吾後見火起必還走吾按黒地而處強弩材士衛吾左右又燔吾前後若此則敵不能害我武王曰敵人燔吾左右又燔吾前後煙覆吾軍其大兵按黒地而起爲之奈何太公曰若此者爲四武衝陳強弩翼吾左右其法無勝亦無負壘虚武王問太公曰何以知敵壘之虚實自來自去太公曰將必上知天道下知地理中知人事登髙下望以觀敵之變動望其壘即知其虚實望其士卒則知其去來武王曰何以知之太公曰聽其鼓無音鐸無聲望其壘上多飛鳥而不驚上無氛氣必知敵詐而爲偶人也敵人卒去不逺未定而復返者彼用其士卒太疾也太疾則前後不相次不相次則行陳必亂如此者急出兵擊之以少擊衆則必勝矣
