front:
  text: 六韜卷第五豹韜
  hash: sha256:975711f5348cebb0b1aed98fef069e2d8e2a6133f098f6d989a51cedc00d94fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_SBCK_005-1a}
body:
  text: 林戰武王問太公曰引兵深入諸侯之地遇大林與敵分林相拒吾欲以守則固以戰則勝爲之奈何太公曰使吾三軍分爲衝陳便兵所處弓弩爲表㦸楯爲裏斬除草木極廣吾道以便戰所髙置旌旗謹勑三軍無使敵人知吾之情是謂林戰林戰之法率吾矛㦸相與爲伍林間木踈以􅀐爲輔戰車居前見便則戰不見便則止林多險阻必置衝陳以備前後三軍疾戰敵人雖衆其將可走更戰更息各按其部是謂林戰之紀突戰武王問太公曰敵人深入長驅侵掠我地驅我牛馬其三軍大至薄我城下吾士卒大恐人民係累爲敵所虜吾欲以守則固以戰則勝爲之柰何太公曰如此者謂之突兵其牛馬必不得食士卒絶糧􅁀擊而前令我逺邑别軍選其銳士疾擊其後審其期曰必會於晦三軍疾戰敵人雖衆其將可虜武王曰敵人分爲三四或戰而侵掠我地或止而収我牛馬其大軍未盡至而使㓂薄我城下致吾三軍恐懼爲之奈何太公曰謹􅃸敵人未盡至則設備而待之去城四里而爲壘金鼔旌旗皆列而張别隊爲伏兵令我壘上多積強弩百歩一突門門有行馬車􅀐居外勇力銳士隱伏而處敵人若至使我輕卒合戰而佯走令我城上立旌旗擊鼙鼓完爲守備敵人以我爲守城必薄我城下發吾伏兵以衝其内或擊其外三軍疾戰或擊其前或擊其後勇者不得􅃲輕者不及走名曰突戰敵人雖衆其將必走武王曰善哉敵強武王問太公曰引兵深入諸侯之地與敵人衝軍相當敵衆我寡敵強我弱敵人夜來或攻吾左或攻吾右三軍震動吾欲以戰則勝以守則固爲之奈何太公曰如此者謂之震㓂利以出戰不可以守選吾材士強弩車􅀐爲之左右疾擊其前急攻其後或擊其表或擊其裏其卒必亂其將必駭武王曰敵人逺遮我前急攻我後斷我銳兵絶我材士吾内外不得相聞三軍擾亂皆散而走士卒無􅃲志將吏無守心爲之奈何太公曰明哉王之問也當明號審令岀我勇銳冒將之士人操炬火二人同鼔必知敵人所在或擊其表或擊其裏微號相知令之滅火鼓音皆止中外相應期約皆當三軍疾戰敵必敗亡武王曰善哉敵武武王問太公曰引兵深入諸侯之地卒遇敵人甚衆且武武車驍􅀐繞我左右吾三軍皆震走不可止爲之奈何太公曰如此者謂之敗兵善者以勝不善者以亡武王曰用之奈何太公曰伏我材士強弩武車驍􅀐爲之左右常去前後三里敵人逐我發我車􅀐衝其左右如此則敵人擾亂吾走者自止武王曰敵人與我車􅀐相當敵衆我少敵強我弱其來整治精銳吾陳不敢當爲之奈何太公曰選我材士強弩伏於左右車􅀐堅陳而處敵人過我伏兵積弩射其左右車􅀐銳兵疾擊其軍或擊其前或擊其後敵人雖衆其將必走武王曰善哉鳥雲山兵武王問太公曰引兵深入諸侯之地遇髙山盤石其上亭亭無有草木四面受敵吾三軍恐懼士卒迷惑吾欲以守則固以戰則勝爲之奈何太公曰凡三軍處山之髙則爲敵所棲處山之下則爲敵所囚旣以被山而處必爲鳥雲之陳鳥雲之陳隂陽皆備或屯其隂或屯其陽處山之陽備山之隂處山之隂備山之陽處山之左備山之右處山之右備山之左其山敵所能陵者兵備其表衢道通谷絶以武車髙置旌旗謹勑三軍無使敵人知吾之情是謂山城行列巳定士卒巳陳法令巳行竒正巳設各置衝陳於山之表便兵所處乃分車􅀐爲鳥雲之陳三軍疾戰敵人雖衆其將可擒鳥雲澤兵武王問太公曰引兵深入諸侯之地與敵人臨水相拒敵富而衆我貧而寡踰水擊之則不能前欲久其日則糧食少吾居斥鹵之地四旁無邑又無草木三軍無所掠取牛馬無所芻牧爲之奈何太公曰三軍無備牛馬無食士卒無糧如此者索便詐敵而亟去之設伏兵於後武王曰敵不可得而詐吾士卒迷惑敵人越我前後吾三軍敗亂而走爲之奈何太公曰求途之道金玉爲主必因敵使精微爲寶武王曰敵人知我伏兵大軍不肯濟别將分隊以踰於水吾三軍大恐爲之奈何太公曰如此者分爲衝陳便兵所處湏其畢出發我伏兵疾擊其後強弩兩旁射其左右車􅀐分爲鳥雲之陳備其前後三軍疾戰敵人見我戰合其大軍必濟水而來發我伏兵疾擊其後車􅀐衝其左右敵人雖衆其將可走凡用兵之大要當敵臨戰必宜衝陣便兵所處然後以軍􅀐分爲鳥雲之陳此用兵之竒也所謂鳥雲者鳥散而雲合變化無窮者也武王曰善哉少衆武王問太公曰吾欲以少擊衆以弱擊彊爲之柰何太公曰以少擊衆者必以日之暮伏於深草要之隘路以弱擊彊者必得大􅀦而與隣國之助武王曰我無深草又無隘路敵人已至不適日暮我無大國之與又無隣國之助爲之柰何太公曰妄張詐誘以熒惑其將迂其道令過深草逺其路令會日路前行未渡水後行未及舎發我伏兵疾擊其左右車􅀐擾亂其前後敵人雖衆其將可走事大國之君下鄰國之士厚其幣卑其辭如此則得大國之與鄰􅀦之助矣武王曰善哉分險武王問太公曰引兵深入諸侯之地與敵人相遇於險阨之中吾左山而右水敵右山而左水與我分險相拒各欲以守則固以戰則勝爲之柰何太公曰處山之左急備山之右處山之右急備山之左險有大水無舟楫者以天潢濟吾三軍巳濟者亟廣吾道以便戰所以武衝爲前後列其強弩令行陳皆固衢道谷口以武衝絶之髙置旌旗是謂車城凡險戰之法以武衝爲前大櫓爲衛材士強弩翼吾左右三千人爲屯必置衝陳便兵所處左軍以左右軍以右中軍以中並攻而前巳戰者還歸屯所更戰更息必勝乃巳武王曰善哉六韜卷第五
