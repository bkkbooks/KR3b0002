front:
  text: 六韜卷第六犬韜
  hash: sha256:26817abbd2ac7462dbe3ab642c585b7061279983a82c55d3fad0438e1802dc9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_SBCK_006-1a}
body:
  text: 分兵武王問太公曰王者帥師三軍分爲數處將欲期㑹合戰約誓賞罰爲之柰何太公曰凡用兵之法三軍之衆必有分合之變其大將先定戰地戰日然後移檄書與諸將吏期攻城圍邑各㑹其所明告戰日漏刻有時大將設營而陳立表轅門清道而待諸將吏至者校其先後先期至者賞後期至者斬如此則逺近奔集三軍俱至并力合戰武鋒武王問太公曰凡用兵之要必有武車驍􅀐馳陳選鋒見可則擊之如何則可擊太公曰夫欲擊者當審察敵人十四變變見則擊之敵人必敗武王曰十四變可得聞乎太公曰敵人新集可擊人馬未食可擊天時不順可擊地形未得可擊奔走可擊不戒可擊疲勞可擊將離士卒可擊渉長路可擊濟水可擊不暇可擊阻難狹路可擊亂行可擊心怖可擊練士武王問太公曰練士之道柰何太公曰軍中有大勇敢死樂傷者聚爲一卒名曰冐刃之士有銳氣壯勇彊􅁀者聚爲一卒名曰䧟陳之士有竒表長劒接武齊列者聚爲一卒名曰勇銳之士有㧞距伸鈎彊梁多力潰破金皷絶滅旌旗者聚爲一卒名曰勇力之士有踰髙絶逺輕足善走者聚爲一卒名曰冠兵之士有王臣失勢欲復見功者聚爲一卒名曰死闘之士有死將之人子弟欲與其將報仇者聚爲一卒名曰敢死之士有贅婿人虜欲掩迹揚名者聚爲一卒名曰勵鈍之士有貧窮憤怒欲快其心者聚爲一卒名曰必死之士有胥靡免罪之人欲逃其耻者聚爲一卒名曰倖用之士有材技兼人能􅀒重致逺者聚爲一卒名曰待命之士此軍之服習不可不察也敎戰武王問太公曰合三軍之衆欲令士卒練士敎戰之道奈何太公曰凡領三軍有金鼓之節所以整齊士衆者也將必先明告吏士申之以三令以敎操兵起居旌旗指麾之變法故教吏士使一人學戰敎成合之十人十人學戰教成合之百人百人學戰教成合之千人千人學戰敎成合之萬人萬人學戰教成合之三軍之衆大戰之法教成合之百萬之衆故能成其大兵立威於天下武王曰善哉均兵武王問太公曰以車與歩卒戰一車當㡬歩卒㡬歩卒當一車以􅀐與歩卒戰一􅀐當㡬歩卒㡬歩卒當一􅀐以車與􅀐戰一車當㡬􅀐㡬􅀐當一車太公曰車者軍之羽翼也所以䧟堅陳要彊敵遮走北也􅀐者軍之伺候也所以踵敗軍絶糧道擊便㓂也故車􅀐不敵戰則一􅀐不能當歩卒一人三軍之衆成陳而相當則易戰之法一車當歩卒八十人八十人當一車一􅀐當歩卒八人八人當一􅀐一車當十􅀐十􅀐當一車險戰之法一車當歩卒四十人四十人當一車一􅀐當歩卒四人四人當一􅀐一車當六􅀐六􅀐當一卒夫車􅀐者軍之武兵也十乗敗千人百乗敗萬人十􅀐敗百人百􅀐走千人此其大數也武王曰車􅀐之吏數陳法柰何太公曰置車之吏數五車一長十車一吏五十車一率百車一將易戰之法五車爲列相去四十歩左右十歩隊間六十歩險戰之法車必循道十車爲聚二十車爲屯前後相去二十歩左右六歩隊問三十六歩五車一長縱橫相去二里各返故道置􅀐之吏數五􅀐一長十􅀐一吏百􅀐一率二百􅀐一將易戰之法五􅀐爲列前後相去二十歩左右四歩隊間五十歩險戰者前後相去十歩左右二歩隊間二十五歩三十􅀐爲一屯六十􅀐爲一輩十􅀐一吏縱横相去百歩周環各復故處武王曰善哉武車士武王問太公曰選車士奈何太公曰選車士之法取年四十巳下長七尺五寸巳上走能逐奔馬及馳而乗之前後左右上下周旋能縛束旌旗力能彀八石弩射前後左右皆便習者名曰武車之士不可不厚也武􅀐士武王問太公曰選􅀐士奈何太公曰選􅀐士之法取年四十巳下長七尺五寸巳上壯徤捷疾超絶倫等能馳􅀐彀射前後左右周旋進退越溝塹登丘陵冒險阻絶大澤馳強敵亂大衆者名曰武􅀐之士不可不厚也戰車武王問太公曰戰車奈何太公曰歩貴知變動車貴知地形􅀐貴知別徑竒道三軍同名而異用也凡車之死地有十其勝地有八武王曰十死之地奈何太公曰往而無以還者車之死地也越絶險阻乗敵逺行者車之竭地也前易後險者車之困地也䧟之險阻而難出者車之絶地也圯下漸澤黒土黏埴者車之勞地也左險右易上陵仰阪者車之逆地也殷草横􅅿犯歷深澤者車之拂地也車少地易與歩不敵者車之敗地也後有溝瀆左有深水右有峻阪者車之壞地也日夜霖􅀨旬日不止道路潰䧟前不能進後不能解者車之䧟地也此十者車之死地也故拙將之所以見擒明將之所以能避也武王曰八勝之地奈何太公曰敵之前後行陳未定即䧟之旌旗擾亂人馬數動即䧟之士卒或前或後或左或右即䧟之陳不堅固士卒前後相顧即䧟之前往而疑後恐而怯即䧟之三軍卒驚皆薄而起即䧟之戰於易地暮不能解即䧟之逺行而暮舎三軍恐懼即䧟之此八者車之勝地也將明於十害八勝敵雖圍周千乗萬􅀐前驅旁馳萬戰必勝武王曰善哉戰􅀐武王問太公曰戰􅀐奈何太公曰􅀐有十勝九敗武王曰十勝奈何太公曰敵人始至行陳未定前後不屬䧟其前􅀐擊其左右敵人必走敵人行陳整齊堅固士卒欲􅃲吾􅀐翼而勿去或馳而往或馳而來其疾如風其􅁀如雷白晝而昏數更旌旗變易衣服其軍可克敵人行陳不固士卒不􅃲薄其前後獵其左右翼而擊之敵人必懼敵人暮欲歸舎三軍恐駭翼其兩旁疾擊其後薄其壘口無使得入敵人必敗敵人無險阻保固深入長驅絶其糧路敵人必飢地平而易四面見敵車􅀐䧟之敵人必亂敵人奔走士卒散亂或翼其兩旁或掩其前後其將可擒敵人暮返其兵甚衆其行陳必亂令我􅀐十而爲隊百而爲屯車五而爲聚十而爲羣多設旌旗雜以強弩或擊其兩旁或絶其前後敵將可虜此􅀐之十勝也武王曰九敗奈何太公曰凡以􅀐䧟敵而不能破陳敵人佯走以車􅀐返擊我後此􅀐之敗地也追北踰險長驅不止敵人伏我兩旁又絶我後此􅀐之圍地也往而無以返入而無以出是謂䧟於天井頓於地穴此􅀐之死地也所從入者隘所從出者逺彼弱可以擊我強彼寡可以擊我衆此􅀐之􅃿地也大澗深谷翳薉林木此􅀐之竭地也左右有水前有大阜後有髙山三軍戰於兩水之間敵居表裏此􅀐之艱地也敵人絶我糧道往而無以返此􅀐之困地也汙下沮澤進退漸洳此􅀐之患地也左有深溝右有坑阜髙下如平地進退誘敵此􅀐之䧟地也此九者􅀐之死地也明將之所以逺避闇將之所以䧟敗也戰歩武王問太公曰歩兵車􅀐戰奈何太公曰歩兵與車􅀐戰者必依丘陵險阻長兵強弩居前短兵弱弩居後更發更止敵之車􅀐雖衆而至堅陣疾戰材士強弩以備我後武王曰吾無丘陵又無險阻敵人之至旣衆且武車􅀐翼我兩旁獵我前後吾三軍恐怖亂敗而走爲之奈何太公曰令我士卒爲行馬木蒺藜置牛馬隊伍爲四武衝陣望敵車􅀐將來均置蒺藜掘地匝後廣深五尺名曰命籠人操行馬進歩闌車以爲壘推而前後立而爲屯材士強弩備我左右然後令我三軍皆疾戰而不解武王曰善哉六韜卷第六
