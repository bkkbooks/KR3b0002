front:
  text: 六韜卷第三龍韜
  hash: sha256:bfd02e642659409c2251e1b0199cefe423f5c701d2d674776dc2b4bfab5fd79a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_SBCK_003-1a}
body:
  text: 王翼武王問太公曰王者帥師必有股肱羽翼以成威神爲之柰何太公曰凡舉兵帥師以將爲命命在通逹不守一術因能受職各取所長隨時變化以爲綱紀故將有股肱羽翼七十二人以應天道備數如法審知命理殊能異技萬事畢矣武王曰請問其目太公曰腹心一人主潜謀應卒揆夫消變揔攬計謀保全民命謀士五人主啚安危慮未萌論行能明賞罰授官位决嫌疑定可否天文三人主司星曆候風氣推時曰考符驗校灾異知人心去就之機地利三人主三軍行止形􅀔利害消息逺近險易水涸山阻不失地利兵法九人主講論異同行事成敗簡練兵器刺舉非法通糧四人主度飲食蓄積通糧道􅆀五􅂖令三軍不困乏奮威四人主擇材力論兵革風馳電擊不知所由伏鼓旗三人主伏鼓旗明耳目詭符節􅍝號令闇忽徃來出入若神股肱四人主任重持難修溝壍治壁壘以備守禦通材三人主拾遺補過應偶賔客論議談語消患觧結權士三人主行竒譎設殊異非人所識行無窮之變耳目七人主往來聽言視變覽四方之事軍中之情􅀲牙五人主揚威武激勵三軍使冒難攻銳無所疑慮羽翼四人主揚名譽震逺方揺動四境以弱敵心遊士八人主伺姦􅃸變開闔人情觀敵之意以爲間諜術士二人主爲譎詐依託􅀑神以惑衆心方士二人主百藥以治金瘡以痊萬病法筭二人主計㑹三軍營壁糧食財用出入論將武王問太公曰論將之道奈何太公曰將有五材十過武王曰敢問其目太公曰所謂五材者勇智仁信忠也勇則不可犯智則不可亂仁則愛人信則不欺忠則無二心所謂十過者有勇而輕死者有急而心速者有貪而好利者有仁而不忍人者有智而心怯者有信而喜信人者有廉㓗而不愛人者有智而心緩者有剛毅而自用者有懦而喜任人者勇而輕死者可暴也急而心速者可乆也貪而好利者可遺也仁而不忍人者可勞也智而心怯者可窘也信而喜信人者可誑也廉㓗而不愛人者可侮也智而心緩者可襲也剛毅而自用者可事也懦而喜任人者可欺也故兵者國之大事存亡之道命在於將將者國之輔先王之所重也故置將不可不察也故曰兵不兩勝亦不兩敗兵出踰境期不十日不有亡國必有破軍殺將武王曰善哉選將武王問太公曰王者舉兵欲簡練英雄知士之髙下爲之奈何太公曰夫士外貌不與中情相應者十五有嚴而不肖者有溫良而爲盗者有貌恭敬而心慢者有外廉謹而内無至誠者有精精而無情者有湛湛而無誠者有好謀而不决者有如果敢而不能者有悾悾而不信者有怳怳惚惚而反忠實者有詭激而有功効者有外勇而内怯者有肅肅而反易人者有嗃嗃而反靜慤者有勢虚形劣而外岀無所不至無所不遂者天下所賤聖人所貴凡人莫知非有大明不見其際此士之外貌不與中情相應者也武王曰何以知之太公曰知之有八徴一曰問之以言以觀其辭二曰窮之以辭以觀其變三曰與之閒謀以觀其誠四曰明白顯問以觀其德五曰使之以財以觀其廉六曰試之以色以觀其貞七曰告之以難以觀其勇八曰醉之以酒以觀其態八徴皆備則賢不肖别矣立將武王問太公曰立將之道奈何太公曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍今某國不臣願將軍帥師應之將旣受命乃命太史􅁲齋三日之太廟鑚靈􅀛􅁲吉日以授斧􅃏君入廟門西面而立將入廟門北面而立君親操􅃏持首授將其柄曰從此上至天者將軍制之復操斧持柄授將其刃曰從此下至淵者將軍制之見其虚則進見其實則止勿以三軍爲衆而輕敵勿以受命爲重而必死勿以身貴而賤人勿以獨見而違衆勿以辯􅀃爲必然士未坐勿坐士未食勿食寒暑必同如此則士衆必盡死力將巳受命拜而報君曰臣聞國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣旣受命專斧􅃏之威臣不敢生還願君亦垂一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不聞君命皆由將出臨敵决戰無有二心若此則無天於上無地於下無敵於前無君於後是故智者爲之謀勇者爲之􅃲氣厲青雲疾若馳騖兵不接刃而敵降服戰勝於外功立於内吏遷士賞百姓懽􅀃將無咎殃是故風雨時節五穀豐熟社稷安寧武王曰善哉將威武王問太公曰將何以爲威何以爲明何以爲禁止而令行太公曰將以誅大爲威以賞小爲明以罰審爲禁止而令行故殺一人而三軍震者殺之賞一人而萬人􅀃者賞之殺貴大賞貴小殺及當路貴重之臣是刑上極也賞及牛竪馬洗廐養之徒是賞下通也刑上極賞下通是將威之所行也勵軍武王問太公曰吾欲令三軍之衆攻城爭先登野戰爭先赴聞金聲而怒聞鼓聲而喜爲之奈何太公曰將有三武王曰敢問其目太公曰將冬不服裘夏不操扇雨不張蓋名曰禮將將不身服禮無以知士卒之寒暑出隘塞犯泥塗將必先下歩名曰力將將不身服力無以知士卒之勞苦軍皆定次將乃就舎炊者皆熟將乃就食軍不舉火將亦不舉名曰上欲將將不身服止欲無以知士卒之飢飽將與士卒共寒暑勞苦飢飽故三軍之衆聞鼓聲則喜聞金聲則怒髙城􅀷池矢石繁下士爭先登白刃始合士爭先赴士非好死而樂傷也爲其將知寒暑飢飽之審而見勞苦之明也隂符武王問太公曰引兵􅀷入諸侯之地三軍卒有緩急或利或害吾將以近通逺從中􅀿外以給三軍之用爲之奈何太公曰主與將有隂符凡八等有大勝克敵之符長一尺破軍擒將之符長九寸降城得邑之符長八寸却敵報逺之符長七寸警衆堅守之符長六寸請糧益兵之符長五寸敗軍亡將之符長四寸失利亡士之符長三寸諸奉使行符稽留若符事聞泄告者皆誅之八符者主將祕聞所以隂通言語不泄中外相知之術敵雖聖智莫之能識武王曰善哉隂書武王問太公曰引兵深入諸侯之地主將欲合兵行無窮之變圖不測之利其事煩多符不能明相去遼逺言語不通爲之奈何太公曰諸有隂事大慮當用書不用符主以書遺將將以書問主書皆一合而再離三發而一知再離者分書爲三部三發而一知者言三人人操一分相參而不相知情也此謂隂書敵雖聖智莫之能識武王曰善哉軍勢武王問太公曰攻伐之道奈何太公曰資因敵家之動變生於兩陳之間竒正發於無窮之源故至事不語用兵不言且事之至者其言不足聽也兵之用者其狀不足見也倐而往忽而來能獨專而不制者兵也夫兵聞則議見則圖知則困辨則危故善戰者不待張軍善除患者理於未生善勝敵者勝於無形上戰無與戰故爭勝於白刃之前者非良將也設備於巳失之後者非上聖也智與衆同非國師也技與衆同非國工也事莫大於必克用莫大於􅀇黙動莫神於不意謀莫善於不識夫先勝者先見弱於敵而後戰者也故事半而功倍焉聖人徴於天地之動孰知其紀循隂陽之道而從其候當天地盈縮因以爲常物有死生因天地之形故曰未見形而戰雖衆必敗善戰者居之不撓見勝則起不勝則止故曰無恐懼無猶豫用兵之害猶豫最大三軍之災莫過狐疑善者見利不失遇時不疑失利後時反受其殃故智者從之而不釋巧者一决而不猶豫是以疾雷不及掩耳迅電不及瞑目赴之若驚用之若狂當之者破近之者亡孰能禦之夫將有所不言而守者神也有所不見而視者明也故知神明之道者野無衡敵對無立􅀦武王曰善㢤竒兵武王問太公曰凡用兵之道大要何如太公曰古之善戰者非能戰於天上非能戰於地下其成與敗皆由神勢得之者昌失之者亡夫兩陳之間岀甲陳兵縱卒亂行者所以爲變也深草蓊蘙者所以逃遁也谿谷險阻者所以止車禦􅀐也隘塞山林者所以少擊衆也􅉾澤窈㝠者所以匿其形也清明無隱者所以戰勇力也疾如流矢如發機者所以破精微也詭伏設竒逺張誑誘者所以破軍擒將也四分五裂者所以擊圎破方也困其驚驤者所以一擊十也因其勞倦暮舎者所以十擊百也竒伎者所以越深水渡江河也彊弩長兵者所以踰水戰也長􅀜逺候暴疾􅍝遁者所以降城服邑也鼓行喧囂者所以行竒謀也大風甚雨者所以搏前擒後也僞稱敵使者所以絶糧道也􅍝號令與敵同服者所以備走北也戰必以義者所以勵衆勝敵也尊爵重賞者所以勸用命也嚴刑罰者所以進罷怠也一喜一怒一與一奪一文一武一徐一疾者所以調和三軍制一臣下也䖏髙敞者所以警守也保阻險者所以爲固也山林茂􅁾者所以黙徃来也深溝髙壘粮多者􅀁以持乆也故曰不知戰攻之䇿不可以語敵不能分移不可以語竒不通治亂不可以語變故曰將不仁則三軍不親將不勇則三軍不銳將不智則三軍大疑將不明則三軍大傾將不精微則三軍失其機將不常戒則三軍失其備將不彊力則三軍失其職故將者人之司命三軍與之俱治與之俱亂得賢將者兵彊􅀦昌不得賢將者兵弱􅀦亡武王曰善㢤五音武王問太公曰律音之聲可以知三軍之消㤙勝負之决乎太公曰深哉王之問也夫律管十二其要有五音宫商角徴羽此其正聲也萬代不易五行之神道之常也可以知敵金木水火土各以其勝攻之古者三皇之世虚無之情以制剛彊無有文字皆由五行五行之道天地自然六甲之分微妙之神其法以天清浄無隂雲風雨夜半遣輕騎徃至敵人之壘去九百歩外偏持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徵聲應管當以􅀇武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徵成敗之機武王曰善哉太公曰微妙之音皆有外候武王曰何以知之太公曰敵人驚動則聽之聞枹鼓之音者角也見火光者徵也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五者聲色之符也兵徴武王問太公曰吾欲未戰先知敵人之強弱豫見勝􅀒之徴爲之奈何太公曰勝􅀒之徴精神先見明將察之其敗在人謹候敵人出入進退察其動靜言語祅祥士卒所告凡三軍􅀃懌士卒畏法敬其將命相喜以破敵相陳以勇猛相賢以威武此強徴也三軍數驚士卒不齊相恐以敵強相語以不利耳目相屬祅言不止衆口相惑不畏法令不重其將此弱徴也三軍齊整陳勢巳固􅀷溝髙壘又有大風甚雨之利三軍無故旌旗前指金鐸之聲揚以清鼙鼓之聲宛以鳴此得神明之助大勝之徴也行陳不固旌旗亂而相繞逆大風甚雨之利士卒恐懼氣絶而不屬戎馬驚奔兵車折軸金鐸之聲下以濁鼙鼓之聲濕如沐此大敗之徴也凡攻城圍邑城之氣色如死􅁅城可屠城之氣出而北城可克城之氣出而西城必降城之氣出而南城不可拔城之氣出而東城不可攻城之氣出而復入城主逃北城之氣出而覆我軍之上軍必病城之氣岀髙而無所止用曰長乆凡攻城圍邑過旬不雷不􅀨必亟去之城必有大輔此所以知可攻而攻不可攻而止武王曰善哉農器武王問太公曰天下安定國家無事戰攻之具可無修乎守禦之備可無設乎太公曰戰攻守禦之具盡在於人事耒耜者其行馬蒺藜也馬牛車輿者其營壘蔽櫓也鋤耰之具其矛㦸也蓑薛簦笠者其甲胄干楯也钁鍤斧鋸杵臼其攻城器也牛馬所以轉輸糧用也雞犬其伺候也婦人織紝其旌旗也丈夫平壤其攻城也春鏺草􅁄其戰車􅀐也夏耨田疇具戰歩兵也秋刈禾薪其糧食儲備也冬實倉廩其堅守也田里相伍其約束符信也里有吏官有長其將帥也里有周垣不得相過其隊分也輸粟収芻其廪庫也春秋治城郭修溝渠其壍壘也故用兵之具盡在於人事也善爲國者取於人事故必使遂其六畜闢其田野安其處所丈夫治田有􅅿數婦人織紝有尺度是富國強兵之道也武王曰善哉
