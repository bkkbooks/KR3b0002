  text: 六韜第二武韜
  hash: sha256:0a35540b7c49e5a68969fb6b2cc13833d619d838491d4781f06722a2a187e903
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0002_SBCK_002-1a}
body:
  text: 發啓文王在酆召太公曰嗚呼商王虐極罪殺不辜公尚助子憂民如何太公曰王其修德以下賢惠民以觀天道天道無殃不可先倡人道無災不可先謀必見天殃又見人災乃可以謀必見其陽又見其隂乃知其心必見其外又見其内乃知其意必見其䟽又見其親乃知其情行其道道可致也從其門門可入也立其禮禮可成也爭其強強可勝也全勝不􅃲大兵無創與􅀑神通微哉微哉與人同病相救同情相成同惡相助同好相趨故無甲兵而勝無衝機而攻無溝壍而守大智不智大謀不謀大勇不勇大利不利利天下者天下啓之害天下者天下閉之天下者非一人之天下乃天下之天下也取天下者若逐野獸而天下皆有分􅁏之心若同舟而濟濟則皆同其利敗則皆同其害然則皆有啓之無有閉之也無取於民者取民者也無取於國者取國者也無取於天下者取天下者也無取民者民利之無取國者國利之無取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑飛歛翼猛獸將􅅮弭耳俯伏聖人將動必有愚色今彼殷商衆口相惑紛紛渺渺好色無極此亡國之徴也吾觀其野草菅勝穀吾觀其衆邪曲勝直吾觀其吏􅁀虐残賊敗法亂刑上下不覺此亡國之時也大明發而萬物皆照大義發而萬物皆利大兵發而萬物皆服大哉聖人之德獨聞獨見樂哉文啓文王問太公曰聖人何守太公曰何憂何嗇萬物皆得何嗇何憂萬物皆遒政之所施莫知其化時之所在莫知其移聖人守此而萬物化何窮之有終而復始優之游之展轉求之求而得之不可不藏旣以藏之不可不行旣以行之勿復明之夫天地不自明故能長生聖人不自明故能名彰古之聖人聚人而爲家聚家而爲國聚國而爲天下分封賢人以爲萬國命之曰大紀陳其政敎順其民俗羣曲化直變於形容萬國不通各樂其所人愛其上命之曰大定嗚呼聖人務靜之賢人務正之愚人不能正故與人爭上勞則刑繁刑繁則民憂民憂則流亡上下不安其生累丗不休命之曰大失天下之人如流水障之則止啓之則行靜之則清嗚呼神哉聖人見其所始則知其所終文王曰靜之奈何太公曰天有常形民有常生與天下共其生而天下靜矣太上因之其次化之夫民化而從政是以天無爲而成事民無與而自富此聖人之德也文王曰公言乃恊子懷夙夜念之不忘以用爲常文伐文王問太公曰文伐之法奈何太公曰凡文伐有十二節一曰因其所喜以順其志彼將生驕必有好事苟能因之必能去之二曰親其所愛以分其威一人兩心其中必衰廷無忠臣社稷必危三曰隂賂左右得情甚深身内情外國將生害四曰輔其淫樂以廣其志厚賂珠玉娱以美人卑辭委聽順命而合彼將不爭姦節乃定五曰嚴其忠臣而薄其賂稽留其使勿聽其事亟爲置代遺以誠事親而信之其君將復合之苟能嚴之國乃可謀六曰収其内閒其外才臣外相敵國内侵國鮮不亡七曰欲錮其心必厚賂之収其左右忠愛隂示以利令之輕業而蓄積空虚八曰賂以重寶因與之謀謀而利之利之必信是謂重親重親之積必爲我用有國而外其地大敗九曰尊之以名無難其身示以大勢從之必信致其大尊先爲之榮微飾聖人國乃大偷十曰下之必信以得其情承意應事如與同生旣以得之乃微収之時及將至􅀂天喪之十一曰塞之以道人臣無不重貴與富惡死與咎隂示大尊而微輸重寶収其豪傑内積甚厚而外爲乏隂納智士使圖其計納勇士使髙其氣富貴甚足而常有繁滋徒黨巳具是謂塞之有國而塞安能有國十二曰養其亂臣以迷之進羙女淫聲以惑之遺良犬馬以勞之時與大勢以誘之上察而與天下圖之十二節備乃成武事所謂上察天下察地徴巳見乃伐之順啓文王問太公曰何如而可爲天下太公曰大蓋天下然後能容天下信蓋天下然後能約天下仁蓋天下然後能懷天下恩蓋天下然後能保天下權蓋天下然後能不失天下事而不疑則天運不能移時變不能遷此六者備然後可以爲天下政故利天下者天下啓之害天下者天下閉之生天下者天下德之殺天下者天下賊之徹天下者天下通之窮天下者天下仇之安天下者天下恃之危天下者天下災之天下者非一人之天下唯有道者處之三疑武王問太公曰予欲立功有三疑恐力不能攻強離親散衆爲之奈何太公曰因之慎謀用財夫攻強必養之使強益之使張太強必折太張必缺攻強以強離親以親散衆以衆凡謀之道周密爲寶設之以事玩之以利爭心必起欲離其親因其所愛與其寵人與之所欲示之所利因以䟽之無使得志彼貪利甚喜遺疑乃止凡攻之道必先塞其明而後攻其強毁其大除民之害淫之以色啗之以利養之以味娱之以樂旣離其親必使逺民勿使知謀扶而納之莫覺其意然後可成惠施於民必無憂財民如牛馬數餧食之從而愛之心以啓智智以啓財財以啓衆衆以啓賢賢之有啓以王天下六韜卷第二
